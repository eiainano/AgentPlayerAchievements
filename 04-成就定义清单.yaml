# Agent Achievement System — 完整成就定义清单
# 版本: 1.0 / 日期: 2026-05-17

definitions:

  # ============================================================
  # Category: Onboarding (入门)
  # ============================================================
  - id: first_contact
    name: "First Contact"
    name_cn: "Hello World"
    description: "完成首次对话。历史记住了这一天。"
    icon: "👋"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: conversation.message
        operator: ">="
        value: 1

  - id: three_company
    name: "Three's Company"
    name_cn: "帽子戏法"
    description: "累计完成 3 个 task。agent 开始认识你了。"
    icon: "🤝"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 3

  - id: tool_time
    name: "Tool Time"
    name_cn: "工具学徒"
    description: "agent 执行了第一个 tool call。世界变大了。"
    icon: "🔧"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: tool.complete
        operator: ">="
        value: 1

  - id: permission_granted
    name: "Permission Granted"
    name_cn: "门禁卡"
    description: "手动调整过 agent 的权限模式。控制权在你手上。"
    icon: "🔐"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: permission.mode_changed
        operator: ">="
        value: 1

  - id: read_manual
    name: "Read the Manual"
    name_cn: "看说明书"
    description: "打开过 help 或文档。很少有人这么做。"
    icon: "📖"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: help.accessed
        operator: ">="
        value: 1

  - id: first_sunrise
    name: "First Sunrise"
    name_cn: "再接再厉"
    description: "24h 内开启 ≥ 2 个 session。agent 已经是习惯了。"
    icon: "🌅"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: threshold
        event: session.start
        window: 24h
        operator: ">="
        value: 2

  # ── Gap #1: 引导性成就（功能发现） ──
  - id: first_shot
    name: "First Shot"
    name_cn: "命令学徒"
    description: "使用了第一个 slash command。你的 CLI 你做主。"
    icon: "🔫"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: command.slash_used
        operator: ">="
        value: 1

  - id: model_hopper
    name: "Model Hopper"
    name_cn: "换换口味"
    description: "手动切换了一次 AI 模型。总有一款适合你。"
    icon: "🔄"
    category: onboarding
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: model.switch
        operator: ">="
        value: 1

  - id: worktree_trial
    name: "Worktree Trial"
    name_cn: "隔离区"
    description: "使用过 worktree 模式在隔离环境中工作。代码安全第一。"
    icon: "🌲"
    category: onboarding
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: worktree.created
        operator: ">="
        value: 1

  - id: mcp_first_contact
    name: "Agent Plug-in"
    name_cn: "场外接入"
    description: "连接了第一个 MCP server。agent 的能力向外延伸了。"
    icon: "🔌"
    category: onboarding
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: mcp.server_used
        operator: ">="
        value: 1

  - id: visual_prompt
    name: "A Picture's Worth"
    name_cn: "有图有真相"
    description: "给 agent 传了一张图片来理解。它看到了你所见的。"
    icon: "🖼️"
    category: onboarding
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name == 'Read' && file_type matches 'image/*'"
        operator: ">="
        value: 1

  # ============================================================
  # Category: Milestones (里程碑)
  # ============================================================
  - id: double_digits
    name: "Double Digits"
    description: "10 个 task 完成。你已经不是新手了。"
    icon: "🔟"
    category: milestone
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 10
        window: all

  - id: century
    name: "Century"
    description: "100 个 task。你开始怀疑没有 agent 的日子是怎么过的。"
    icon: "💯"
    category: milestone
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 100
        window: all

  - id: millennium
    name: "Millennium"
    description: "1000 个 task。你和 agent 已是一种共生关系。"
    icon: "🏆"
    category: milestone
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 1000
        window: all

  - id: marathon
    name: "Marathon"
    description: "单 session 持续超过 3 小时。你还活着吗？"
    icon: "🏃"
    category: milestone
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: session.end
        field: duration_ms
        operator: ">="
        value: 10800000  # 3h in ms

  - id: streak_7
    name: "Streak 7"
    description: "连续 7 天使用。agent 已经是你的日常。"
    icon: "🔥"
    category: milestone
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 7

  - id: streak_30
    name: "Streak 30"
    description: "连续 30 天。不仅是工具，是生活方式。"
    icon: "📅"
    category: milestone
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 30

  - id: streak_100
    name: "Streak 100"
    description: "连续 100 天。应该给你做个纪录片。"
    icon: "🎬"
    category: milestone
    rarity: legendary
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 100

  - id: polyglot
    name: "Polyglot"
    description: "agent 对话涉及过 5 种以上编程语言。"
    icon: "🌐"
    category: milestone
    rarity: uncommon
    hidden: false
    conditions:
      - type: distinct_count
        event: file.create
        field: language
        operator: ">="
        value: 5

  # ============================================================
  # Category: Skill (技巧)
  # ============================================================
  - id: chain_reaction
    name: "Chain Reaction"
    description: "单次对话中 agent 完成 5 步以上连续 tool call。"
    icon: "⛓️"
    category: skill
    rarity: uncommon
    hidden: false
    set: agent_commander
    conditions:
      - type: counter
        event: tool.complete
        window: single_session
        operator: ">="
        value: 5

  - id: full_auto
    name: "Full Auto"
    description: "10 步以上 tool chain，全程自主零拒绝。"
    icon: "🤖"
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: sequence
        event: tool.complete
        window: single_session
        consecutive: true
        count:
          operator: ">="
          value: 10
      - type: counter
        event: tool.deny
        window: same_session
        operator: "=="
        value: 0

  - id: architect
    name: "Architect"
    description: "单 task 中 agent 成功编辑了 5 个以上文件。"
    icon: "🏗️"
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: distinct_count
        event: file.edit
        field: file_path
        window: single_task
        operator: ">="
        value: 5

  - id: surgeon
    name: "Surgeon"
    description: "单 task 只改了恰好需要的部分，零多余改动。"
    icon: "🩺"
    category: skill
    rarity: epic
    hidden: false
    set: agent_commander
    conditions:
      - type: threshold
        metric: "edit_lines / total_file_lines"
        window: single_task
        operator: "<"
        value: 0.05
      - type: event
        event: task.complete
        window: same_task

  - id: seeker
    name: "Seeker"
    description: "单 session 中搜索类 tool ≥ 10 次。你在深挖。"
    icon: "🔍"
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['grep','glob','web_search','web_fetch']"
        window: single_session
        operator: ">="
        value: 10

  - id: the_debugger
    name: "The Debugger"
    description: "agent 代码报错，你让它自己修，修好了。这就是信任。"
    icon: "🐛"
    category: skill
    rarity: uncommon
    hidden: false
    set: the_bug_catcher
    conditions:
      - type: sequence
        events: ["test.fail", "agent.self_fix", "test.pass"]
        window: single_task

  - id: triple_debugger
    name: "Triple Debugger"
    description: "单 task 中 agent 自修复 ≥ 3 次错误。"
    icon: "🪲"
    category: skill
    rarity: rare
    hidden: false
    set: the_bug_catcher
    conditions:
      - type: sequence_count
        pattern: ["test.fail", "agent.self_fix", "test.pass"]
        window: single_task
        operator: ">="
        value: 3

  # ── Gap #2: 强迫多样性成就 ──
  - id: tool_completist
    name: "Tool Completist"
    description: "单 session 中使用过全部核心 tool（Read / Edit / Write / Bash / Think）。五脏俱全。"
    icon: "🧰"
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_name
        values: ["Read", "Edit", "Write", "Bash", "ToolSearch"]
        window: single_session
        operator: ">="
        value: 5

  - id: the_switch
    name: "The Switch"
    description: "同一次 task 中从 Plan 模式切换到 Agent 模式完成最终实现。先谋后动。"
    icon: "🎭"
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: sequence
        events: ["plan.mode_entered", "agent.mode_activated", "task.complete"]
        window: single_task

  # ============================================================
  # Category: Style (风格)
  # ============================================================
  - id: minimalist
    name: "Minimalist"
    description: "prompt 长度排全体前 10% 短。惜字如金，agent 需要很努力。"
    icon: "🪶"
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: percentile
        metric: "avg_prompt_length"
        operator: "<="
        value: 10

  - id: novelist
    name: "Novelist"
    description: "prompt 长度排全体前 10% 长。事无巨细，agent 不用猜。"
    icon: "📝"
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: percentile
        metric: "avg_prompt_length"
        operator: ">="
        value: 90

  - id: one_shot
    name: "One Shot"
    description: "单 task 只问了 agent 一次就完成。"
    icon: "🎯"
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        operator: "=="
        value: 1

  - id: iterative_refiner
    name: "Iterative Refiner"
    description: "单 task 交互 > 20 轮才完成。你在打磨，不是 agent 不行。"
    icon: "🔄"
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        operator: ">"
        value: 20

  - id: night_owl
    name: "Night Owl"
    description: "session 大多在凌晨 (0:00-5:00)。"
    icon: "🦉"
    category: style
    rarity: uncommon
    hidden: true
    set: night_shift
    conditions:
      - type: mode
        event: session.start
        field: hour
        in_range: [0, 5]
        threshold: 0.5  # >50% in this range

  - id: weekend_warrior
    name: "Weekend Warrior"
    description: "session 集中在周末。白天搬砖，周末 coding。"
    icon: "⚔️"
    category: style
    rarity: uncommon
    hidden: true
    set: night_shift
    conditions:
      - type: mode
        event: session.start
        field: day_of_week
        in_range: [0, 6]  # Sat=0, Sun=6
        threshold: 0.5

  - id: copy_paste_king
    name: "Copy-Paste King"
    description: "粘贴内容 / 总输入 > 50%。你在喂 agent 外部知识。"
    icon: "📋"
    category: style
    rarity: uncommon
    hidden: false
    conditions:
      - type: ratio
        numerator: "paste_chars"
        denominator: "total_input_chars"
        operator: ">"
        value: 0.5

  # ============================================================
  # Category: Tool Mastery (工具大师)
  # ============================================================
  - id: file_whisperer
    name: "File Whisperer"
    description: "累计让 agent 编辑了 500 个文件。"
    icon: "📁"
    category: tool_mastery
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: file.edit
        operator: ">="
        value: 500
        window: all

  - id: git_wizard
    name: "Git Wizard"
    description: "agent 参与了 100 次 git commit。"
    icon: "🧙"
    category: tool_mastery
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: git.commit
        filter: "agent_involved == true"
        operator: ">="
        value: 100
        window: all

  - id: shell_shocker
    name: "Shell Shocker"
    description: "agent 在终端执行了 250 次命令。"
    icon: "💻"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['bash','terminal','execute']"
        operator: ">="
        value: 250
        window: all

  - id: web_wanderer
    name: "Web Wanderer"
    description: "agent 上网搜索了 100 次。"
    icon: "🌍"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['web_search','web_fetch']"
        operator: ">="
        value: 100
        window: all

  - id: parallel_universe
    name: "Parallel Universe"
    description: "同一项目同时有 ≥ 3 个 active session。"
    icon: "🌌"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        metric: "concurrent_sessions"
        window: same_project
        operator: ">="
        value: 3

  - id: mcp_explorer
    name: "MCP Explorer"
    description: "连接并使用过 5 个以上 MCP server。"
    icon: "🔌"
    category: tool_mastery
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: distinct_count
        event: mcp.server_used
        operator: ">="
        value: 5

  - id: image_whisperer
    name: "Image Whisperer"
    description: "让 agent 通过图片理解了你的意图。一图胜千言。"
    icon: "📸"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name == 'Read' && file_type matches 'image/*'"
        operator: ">="
        value: 5

  # ============================================================
  # Category: Workflow (工作流)
  # ============================================================
  - id: pr_champion
    name: "PR Champion"
    description: "通过 agent 创建了你的第一个 PR。从代码到协作。"
    icon: "🔀"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: git.pr_created
        filter: "agent_involved == true"
        operator: ">="
        value: 1

  - id: cicd_pioneer
    name: "CI/CD Pioneer"
    description: "agent 帮你创建了 GitHub Actions workflow 文件。自动化从这里开始。"
    icon: "⚙️"
    category: workflow
    rarity: rare
    hidden: false
    conditions:
      - type: counter
        event: file.create
        filter: "file_path matches '.github/workflows/*.yml'"
        operator: ">="
        value: 1

  - id: code_reviewer
    name: "Code Reviewer"
    description: "让 agent 审查过代码，给出了有价值的建议。"
    icon: "👁️"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: code.review_requested
        operator: ">="
        value: 1

  - id: deep_review
    name: "Deep Review"
    description: "agent 一次审查发现 10+ 个问题。AI wrote this, didn't it?"
    icon: "🧐"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: code.review_completed
        field: issues_found
        operator: ">="
        value: 10

  - id: plan_mode_user
    name: "Strategic Thinker"
    description: "对复杂任务使用了 Plan 模式。三思而后 code。"
    icon: "🧠"
    category: workflow
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: plan.mode_entered
        operator: ">="
        value: 1

  - id: plan_strategist
    name: "Plan Strategist"
    description: "累计使用 Plan 模式 25 次。你不写代码，你写蓝图。"
    icon: "📐"
    category: workflow
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: plan.mode_entered
        operator: ">="
        value: 25
        window: all

  - id: auto_committer
    name: "Auto Committer"
    description: "agent 替你 commit 了代码。你只需要点头。"
    icon: "🤖"
    category: workflow
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: git.commit
        filter: "agent_involved == true"
        operator: ">="
        value: 1

  - id: changelog_keeper
    name: "Changelog Keeper"
    description: "agent 帮你写了 changelog。版本历史的守护者。"
    icon: "📋"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: file.create
        filter: "file_path matches 'CHANGELOG*'"
        operator: ">="
        value: 1

  - id: context_conscious
    name: "Context Conscious"
    description: "单 task 中触发了 3 次以上自动压缩。你在挑战 agent 的记忆极限。"
    icon: "🧩"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: context.compacted
        window: single_task
        operator: ">="
        value: 3

  - id: session_veteran
    name: "Session Veteran"
    description: "累计开启 50 个 session。agent 已经是你的老搭档了。"
    icon: "🪖"
    category: workflow
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: session.start
        operator: ">="
        value: 50
        window: all

  - id: session_centurion
    name: "Session Centurion"
    description: "累计开启 300 个 session。你和 agent 的故事可以出书了。"
    icon: "📚"
    category: workflow
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: session.start
        operator: ">="
        value: 300
        window: all

  - id: token_titan
    name: "Token Titan"
    description: "累计消耗 10M token。你是 API 服务商最喜欢的用户类型。"
    icon: "💎"
    category: workflow
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: token.consumed
        unit: tokens
        operator: ">="
        value: 10000000
        window: all

  - id: token_legend
    name: "Token Legend"
    description: "累计消耗 100M token。agent 已经读了比你一生还多的文字。"
    icon: "🌌"
    category: workflow
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: token.consumed
        unit: tokens
        operator: ">="
        value: 100000000
        window: all

  - id: multi_project
    name: "Multi-Project"
    description: "同日内在 3 个以上项目中使用了 agent。你不是专一的用户。"
    icon: "🗂️"
    category: workflow
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: session.start
        field: project_path
        window: 24h
        operator: ">="
        value: 3

  # ── Gap #2 + #3: 全流程 + 多样性 ──
  - id: full_cycle
    name: "Full Cycle"
    description: "agent 独立完成了编码→commit→PR 全过程，你只是看了结果。真正的 delegation。"
    icon: "♻️"
    category: workflow
    rarity: epic
    hidden: false
    conditions:
      - type: sequence
        events: ["task.complete", "git.commit", "git.pr_created"]
        window: single_session

  - id: cycle_master
    name: "Cycle Master"
    description: "累计完成 10 次 Full Cycle（编码→commit→PR）。你几乎不需要写代码了。"
    icon: "🔁"
    category: workflow
    rarity: legendary
    hidden: false
    progress_trackable: true
    conditions:
      - type: sequence_count
        pattern: ["task.complete", "git.commit", "git.pr_created"]
        window: single_session
        operator: ">="
        value: 10

  # ============================================================
  # Category: Creator (创造者)
  # ============================================================
  - id: command_crafter
    name: "Command Crafter"
    description: "创建了你的第一个自定义 slash command。agent 学会了新把戏。"
    icon: "⚡"
    category: creator
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: command.created
