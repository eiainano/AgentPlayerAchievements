    category: skill
    rarity: epic
    hidden: false
    set: agent_commander
    tip: Precision editing is about context — instead of 'fix the bug', point at specific lines. "Add error handling after line 42" produces cleaner, more surgical changes.
    tip_cn: 精准编辑的关键在于上下文——与其说'修复 bug'，不如指向具体行号。"在第 42 行后加错误处理"能产生更干净、更外科手术式的修改。
    conditions:
      - type: threshold
        metric: edit_lines / total_file_lines
        window: single_task
        operator: <
        value: 0.05
      - type: event
        event: task.complete
        window: same_task
