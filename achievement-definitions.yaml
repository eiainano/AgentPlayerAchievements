    tip_cn: 当 agent 报错时，先试试说"修复这个"再手动介入。Agent 能学会自我修正——每次自修复都少一次上下文切换。
    conditions:
      - type: event
        event: agent.self_fix
  - id: the_debugger
    name: The Debugger
    name_cn: 捉虫行动
    name_es: "El Depurador"
    name_ko: "디버거"
    name_ja: "ザ・デバッガー"
    description: Code failed — you let the agent fix it itself.
    description_cn: 代码报错，你让agent自己修好了。
    description_es: "El código falló y dejaste que el agente lo solucionara solo."
    description_ko: "코드가 실패했지만, 에이전트가 스스로 고치게 두었다."
    description_ja: "コードがエラーを吐いても、エージェントに自分で直させた。"
    icon: 🐛
    category: skill
    rarity: uncommon
    hidden: false
    hint: Find and fix some bugs
    hint_cn: 找到并修复一些 bug
    set: bug_catcher
    conditions:
      - type: sequence
        events:
          - test.fail
          - agent.self_fix
          - test.pass
        window: single_task
    tip: Some achievements require a specific sequence of actions. Think of it as a recipe — the order matters as much as
      the ingredients. Plan your approach before diving in.
    tip_cn: 有些成就需要特定的操作序列。把它想象成一个菜谱——顺序和配料同样重要。开始之前先规划好方法。
  - id: triple_debugger
    name: Triple Debugger
    name_cn: 三重调试
    name_es: "Depuración Triple"
    name_ko: "트리플 디버거"
    name_ja: "三重復旧"
    description: Agent self-recovered from 3+ errors in a single task.
    description_cn: 单 task 中 agent 自修复 ≥ 3 次错误。
    description_es: "El agente se recuperó por sí solo de 3 o más errores en una sola tarea."
    description_ko: "단일 작업에서 에이전트가 3회 이상 오류를 스스로 복구함."
    description_ja: "1つのタスク中にエージェントが3回以上エラーから自己復旧した。"
    icon: 🪲
    category: skill
    rarity: rare
    hidden: false
    set: bug_catcher
    tip: Debug chains — fail → fix → fail → fix — teach your agent resilience. When you see a pattern of failures, let the agent work through them. Each cycle builds robustness.
    tip_cn: 失败→修复→失败→修复的调试链能锻炼 agent 的韧性。看到连续报错时，让 agent 自己逐个解决，每轮循环都在增强鲁棒性。
    conditions:
      - type: sequence_count
        pattern:
          - test.fail
          - agent.self_fix
          - test.pass
        window: single_task
        operator: ">="
        value: 3
