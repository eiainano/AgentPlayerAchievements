definitions:
  - id: first_contact
    name: Hello World
    name_cn: Hello World
    description: Start your first agent conversation.
    description_cn: 开启你的第一次Agent对话。
    icon: 👋
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: conversation.message
        operator: ">="
        value: 1
  - id: three_company
    name: Hat Trick
    name_cn: 帽子戏法
    description: 3 tasks completed — a good start, isn't it?
    description_cn: 累计完成 3 个 task，一个好的开始，不是吗？
    icon: 🤝
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 3
  - id: tool_time
    name: I Got Tools
    name_cn: 工具学徒
    description: Your agent executed its first tool call.
    description_cn: agent 执行了第一个 tool call。
    icon: 🔧
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: tool.complete
        operator: ">="
        value: 1
  - id: permission_granted
    name: Permission Granted
    name_cn: 门禁卡
    description: Manually adjusted the agent's permission mode. You're in control.
    description_cn: 手动调整过 agent 的权限模式。控制权，你说了算。
    icon: 🔐
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: permission.mode_changed
        operator: ">="
        value: 1
  - id: read_manual
    name: Read the Manual
    name_cn: 看说明书
    description: Opened help or documentation. Few people do this.
    description_cn: 打开过 help 或文档。很少有人这么做。
    icon: 📖
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: help.accessed
        operator: ">="
        value: 1
  - id: first_sunrise
    name: Once Again
    name_cn: 再接再厉
    description: Started 2+ sessions within 24 hours. You and your agent are getting closer.
    description_cn: 24h 内开启 ≥ 2 个 session。你和agent越来越熟悉了。
    icon: 🌅
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: threshold
        event: session.start
        window: 24h
        operator: ">="
        value: 2
  - id: first_shot
    name: Command & Conquer
    name_cn: 命令与征服
    description: Used your first slash command.
    description_cn: 使用了第一个 slash command。
    icon: 🔫
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: command.slash_used
        operator: ">="
        value: 1
  - id: model_hopper
    name: Model Taste
    name_cn: 换换口味
    description: Switched AI models manually. There's one for every mood.
    description_cn: 手动切换了一次 AI 模型。总有一款适合你。
    icon: 🔄
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: model.switch
        operator: ">="
        value: 1
  - id: worktree_trial
    name: Isolation Area
    name_cn: 隔离区
    description: Used worktree isolation. Code safety first.
    description_cn: 使用了worktree 模式工作。代码安全第一。
    icon: 🌲
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: worktree.created
        operator: ">="
        value: 1
  - id: mcp_first_contact
    name: MCP Plug-in
    name_cn: 场外嘉宾
    description: Connected your first MCP server. Your agent's reach just expanded.
    description_cn: 连接了第一个 MCP server。agent 的能力向外延伸了。
    icon: 🔌
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: mcp.server_used
        operator: ">="
        value: 1
  - id: visual_prompt
    name: A Picture's Worth
    name_cn: 有图有真相
    description: Agent read an image you shared. Visual context unlocked.
    description_cn: agent 读取了你分享的图片。视觉上下文已解锁。
    icon: 🖼️
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: image.read
        operator: ">="
        value: 1
  - id: dashboard_visitor
    name: Window Shopper
    name_cn: 橱窗购物
    description: Opened the achievement Dashboard.
    description_cn: 打开过成就 Dashboard。
    icon: 🪟
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: dashboard.opened
        operator: ">="
        value: 1
  - id: automode_first
    name: Cruise Control
    name_cn: 巡航模式
    description: Activated automode for the first time. Let the agent steer.
    description_cn: 首次激活 automode。让 agent 自己开一会儿。
    icon: ⛵
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    future: true
    conditions:
      - type: counter
        event: automode.start
        operator: ">="
        value: 1
  - id: mcp_first_connect
    name: Signal Established
    name_cn: 信号接通
    description: Connected to an MCP server for the first time.
    description_cn: 首次连接到 MCP server。
    icon: 📡
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    future: true
    conditions:
      - type: counter
        event: mcp.connect
        operator: ">="
        value: 1
  - id: task_creator
    name: Task Manager
    name_cn: 任务管理器
    description: Manually created 5 tasks. Organization is a superpower.
    description_cn: 手动创建了 5 个 task。规划是一种超能力。
    icon: 📋
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: task.create
        operator: ">="
        value: 5
  - id: task_updater
    name: Status Report
    name_cn: 进度汇报
    description: Updated task status 10 times. You track progress like a pro.
    description_cn: 更新了 10 次 task 状态。项目管理，专业水准。
    icon: 📊
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: task.update
        operator: ">="
        value: 10
  - id: error_resilient
    name: Error Resilient
    name_cn: 容错强者
    description: Agent hit 5 errors and kept going. What doesn't kill you…
    description_cn: agent 遭遇 5 次错误依然继续。杀不死你的只会让你更强。
    icon: 🛡️
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: counter
        event: error.occurred
        operator: ">="
        value: 5
  - id: file_purger
    name: Spring Cleaning
    name_cn: 大扫除
    description: Deleted 10 files. Sometimes less is more.
    description_cn: 删除了 10 个文件。少即是多。
    icon: 🧹
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: counter
        event: file.delete
        operator: ">="
        value: 10
  - id: dual_wielder
    name: Three-Sword Style
    name_cn: 三刀流
    description: Used 3+ different tools in a single task. Santoryu — three swords, one warrior.
    description_cn: 同一个 task 里用了 3 种以上不同工具。三刀流——三把刀，一个剑士。
    icon: ⚔️
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_name
        window: single_task
        operator: ">="
        value: 3
    set: tool_connoisseur
  - id: double_digits
    name: Double Digits
    name_cn: 两位数
    description: 10 tasks completed. You're no longer a beginner.
    description_cn: 10 个 task 完成。你已经不是新手了。
    icon: 🔟
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 10
        window: all
  - id: century
    name: Century
    name_cn: 创世纪
    description: 100 tasks completed. You wonder how you ever worked without an agent.
    description_cn: 经历了100 个 task。你开始怀疑没有 agent 的日子是怎么过的。
    icon: 💯
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 100
        window: all
  - id: millennium
    name: Millennium
    name_cn: 千禧年
    description: 1,000 tasks completed. You and your agent are now symbiotic.
    description_cn: 经历了1000 个 task。你和 agent 已是一种共生关系。
    icon: 🏆
    category: milestones
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 1000
        window: all
  - id: marathon
    name: Marathon
    name_cn: 跑马拉松
    description: Single session lasting over 3 hours. Maybe take a bathroom break?
    description_cn: 单 session 持续超过 3 小时。不考虑上个卫生间吗？
    icon: 🏃
    category: milestones
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: session.end
        field: duration_ms
        operator: ">="
        value: 10800000
    set: endurance
  - id: streak_7
    name: Streak 7
    name_cn: 连续7天使用
    description: 7 consecutive days of use. Your agent is part of your daily routine.
    description_cn: 连续 7 天使用。agent 已经是你的日常。
    icon: 🔥
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 7
    set: endurance
  - id: streak_30
    name: Streak 30
    name_cn: 连续30天使用
    description: 30 consecutive days of use. It's not just a tool anymore — it's a lifestyle.
    description_cn: 连续 30 天使用。不仅是工具，是生活方式。
    icon: 📅
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 30
    set: endurance
  - id: streak_100
    name: Streak 100
    name_cn: 连续 100 天使用
    description: 100 consecutive days of use. Are you sure you're not dating your agent?
    description_cn: 连续 100 天使用。你确定自己不是在和Agent谈恋爱？
    icon: 🎬
    category: milestones
    rarity: legendary
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 100
    set: endurance
  - id: polyglot
    name: Polyglot
    name_cn: 多语言人士
    description: Used 5+ programming languages in agent conversations.
    description_cn: agent 对话涉及过 5 种以上编程语言。
    icon: 🌐
    category: milestones
    rarity: uncommon
    hidden: false
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        operator: ">="
        value: 5
  - id: half_century
    name: Half Century
    name_cn: 任务过半百
    description: 50 tasks completed. You're past the rookie phase.
    description_cn: 50 个 task 完成。你不再是新手了。
    icon: 🪙
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 50
        window: all
  - id: streak_3
    name: Three-Day Streak
    name_cn: 三日连击
    description: 3 consecutive days of use. A habit is forming.
    description_cn: 连续 3 天使用。习惯正在养成。比 7 天更近，比明天更远。
    icon: 🎩
    category: milestones
    rarity: common
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 3
    set: endurance
  - id: file_centurion
    name: File Centurion
    name_cn: 文件百夫长
    description: Read 100 files cumulatively. You've seen some code.
    description_cn: 累计读取了 100 个文件。你见过的代码可不少了。
    icon: 📂
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: file.read
        operator: ">="
        value: 100
        window: all
  - id: token_1m
    name: Token Millionaire
    name_cn: 百万富翁
    description: Consumed 1,000,000 tokens. That's a small novel.
    description_cn: 累计消耗 1,000,000 token。够写一本中篇小说了。
    icon: 💎
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: threshold
        event: token.consumed
        field: amount
        operator: ">="
        value: 1000000
        window: all
  - id: test_centurion
    name: Green Bar
    name_cn: 全绿
    description: 100 tests passed. All green, no red.
    description_cn: 累计 100 个测试通过。满屏绿色，赏心悦目。
    icon: ✅
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: test.pass
        operator: ">="
        value: 100
        window: all
  - id: multi_image_day
    name: Photo Album
    name_cn: 相册日
    description: Uploaded 5+ images within 24 hours. Visual thinker.
    description_cn: 24 小时内上传了 5 张以上图片。视觉系思考者。
    icon: 🖼️
    category: milestones
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: image.upload
        operator: ">="
        value: 5
        window: 24h
  - id: chain_reaction
    name: Chain Reaction
    name_cn: 链式反应
    description: 5+ tool calls by the agent in a single conversation.
    description_cn: 单次对话中 agent 完成 5 步以上 tool call。
    icon: ⛓️
    category: skill
    rarity: uncommon
    hidden: false
    set: agent_commander
    conditions:
      - type: counter
        event: tool.complete
        window: single_session
        operator: ">="
        value: 5
  - id: full_auto
    name: Full Auto
    name_cn: 自动档
    description: 10+ tool calls with full autonomy, zero rejections.
    description_cn: 10 步以上 tool调用，全程自主零拒绝。
    icon: 🤖
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: sequence
        event: tool.complete
        window: single_session
        consecutive: true
        count:
          operator: ">="
          value: 10
      - type: counter
        event: tool.deny
        window: same_session
        operator: ==
        value: 0
  - id: architect
    name: Architect
    name_cn: 建筑师
    description: Agent successfully edited 5+ files in a single task.
    description_cn: 单 task 中 agent 成功编辑了 5 个以上文件。
    icon: 🏗️
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: distinct_count
        event: file.edit
        field: file_path
        window: single_task
        operator: ">="
        value: 5
  - id: surgeon
    name: Surgeon
    name_cn: 外科手术
    description: In a single task, you only changed exactly what was needed.
    description_cn: 单 task中，你只改了恰好需要的那一点点。
    icon: 🩺
    category: skill
    rarity: epic
    hidden: false
    set: agent_commander
    conditions:
      - type: threshold
        metric: edit_lines / total_file_lines
        window: single_task
        operator: <
        value: 0.05
      - type: event
        event: task.complete
        window: same_task
  - id: seeker
    name: Seeker
    name_cn: 探索者
    description: 10+ search-type tools used in a single session.
    description_cn: 单 session 中搜索类 tool ≥ 10 次。
    icon: 🔍
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.complete
        filter: tool_name in ['grep','glob','web_search','web_fetch']
        window: single_session
        operator: ">="
        value: 10
  - id: the_debugger
    name: The Debugger
    name_cn: 捉虫行动
    description: Code failed — you let the agent fix it itself.
    description_cn: 代码报错，你让agent自己修好了。
    icon: 🐛
    category: skill
    rarity: uncommon
    hidden: false
    set: bug_catcher
    conditions:
      - type: sequence
        events:
          - test.fail
          - agent.self_fix
          - test.pass
        window: single_task
  - id: triple_debugger
    name: Triple Debugger
    name_cn: 三重调试
    description: Agent self-recovered from 3+ errors in a single task.
    description_cn: 单 task 中 agent 自修复 ≥ 3 次错误。
    icon: 🪲
    category: skill
    rarity: rare
    hidden: false
    set: bug_catcher
    conditions:
      - type: sequence_count
        pattern:
          - test.fail
          - agent.self_fix
          - test.pass
        window: single_task
        operator: ">="
        value: 3
  - id: tool_completist
    name: Tool Completist
    name_cn: 工具大全
    description: Used all core tools (Read / Edit / Write / Bash / Think) in one session.
    description_cn: 单 session 中使用过全部核心 tool（Read / Edit / Write / Bash / Think）。
    icon: 🧰
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_name
        values:
          - Read
          - Edit
          - Write
          - Bash
          - Think
        window: single_session
        operator: ">="
        value: 5
    set: tool_connoisseur
  - id: the_switch
    name: Shift Gears
    name_cn: 模式换档
    description: Switched from Plan mode to non-Plan mode in the same task to complete implementation.
    description_cn: 同一次 task 中从 Plan 模式切换到非Plan模式，完成最终实现。
    icon: 🎭
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: sequence
        events:
          - plan.mode_entered
          - agent.mode_activated
          - task.complete
        window: single_task
  - id: off_the_grid
    name: Off the Grid
    name_cn: 离线模式
    description: Completed a task without using any search tools (WebSearch / WebFetch).
    description_cn: 完成一个 task，全程未使用搜索工具（WebSearch/WebFetch）。
    icon: 🏝️
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: event
        event: task.complete
        window: single_task
      - type: counter
        event: tool.complete
        filter: tool_name in ['web_search','web_fetch']
        window: same_task
        operator: ==
        value: 0
  - id: first_try
    name: Smooth Criminal
    name_cn: 一次就过
    description: Agent's first test run passed on the first try — zero failures, smooth as silk.
    description_cn: agent 写完代码后第一次测试就直接通过，中间无失败，非常丝滑。
    icon: 🐞
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: event
        event: test.pass
        window: single_task
      - type: counter
        event: test.fail
        window: same_task
        operator: ==
        value: 0
      - type: counter
        event: file.edit
        window: same_task
        operator: ">="
        value: 1
    set: bug_catcher
  - id: terminal_only
    name: Terminal Only
    name_cn: 纯终端玩法
    description: Completed a task using only terminal commands, zero file edits. Simple, old-school, effective.
    description_cn: 完成一个 task只用终端命令，零文件编辑。简单、老派，但有效。
    icon: 💻
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: event
        event: task.complete
        window: single_task
      - type: counter
        event: tool.complete
        filter: tool_name in ['edit','write']
        window: same_task
        operator: ==
        value: 0
      - type: counter
        event: tool.complete
        filter: tool_name in ['bash','terminal','execute']
        window: same_task
        operator: ">="
        value: 1
  - id: minimalist
    name: Minimalist
    name_cn: 极简主义
    description: An agent message was 80 characters or fewer. Every word counts.
    description_cn: agent 某条消息长度 ≤ 80 字符，惜字如金。
    icon: 🪶
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: threshold
        event: conversation.message
        field: length
        per_event: true
        role: assistant
        operator: <=
        value: 80
  - id: novelist
    name: Novelist
    name_cn: 小说家
    description: An agent message was 500+ characters. You're thorough!
    description_cn: agent 某条消息长度 ≥ 500 字符，你很细心！
    icon: 📝
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: threshold
        event: conversation.message
        field: length
        per_event: true
        role: assistant
        operator: ">="
        value: 500
  - id: one_shot
    name: One Shot
    name_cn: 一发入魂
    description: Completed a task with just one agent query.
    description_cn: 单 task 只问了 agent 一次就完成。
    icon: 🎯
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        per_event: true
        window: single_task
        operator: ==
        value: 1
  - id: iterative_refiner
    name: Iterative Refiner
    name_cn: 慢工出细活
    description: Single task required 20+ turns to complete.
    description_cn: 单 task 交互 > 20 轮才完成。
    icon: 🔄
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        operator: ">"
        value: 20
  - id: night_owl
    name: Night Owl
    name_cn: 夜猫子
    description: Started a session in the wee hours (0:00-5:00). You're a creature of the night.
    description_cn: 某次在凌晨 (0:00-5:00) 启动了 session。你是夜行动物。
    icon: 🦉
    category: style
    rarity: uncommon
    hidden: true
    set: polar_night
    conditions:
      - type: counter
        event: session.start
        filter: hour in [0, 1, 2, 3, 4, 5]
        operator: ">="
        value: 1
  - id: weekend_warrior
    name: Not Invited to Party
    name_cn: 开趴不邀请我
    description: Session on the weekend. No party to go to?
