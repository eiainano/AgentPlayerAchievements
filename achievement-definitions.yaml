    description_cn: 单 session 中搜索类 tool ≥ 10 次。
    description_es: "Usaste 10 o más herramientas de búsqueda en una sola sesión."
    description_ko: "단일 세션에서 검색형 도구 10회 이상 사용."
    description_ja: "1セッションで検索ツールを10回以上使用。"
