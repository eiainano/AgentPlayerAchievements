    tip_cn: 先写测试再写代码不是教条——是策略。当 Claude 同步生成测试和代码时，你能在 bug 出现前就捕获边界情况。试试 TDD：先测试，再实现。
    conditions:
      - type: event
        event: test.pass
        window: single_task
      - type: counter
        event: test.fail
        window: same_task
        operator: ==
        value: 0
      - type: counter
        event: file.edit
        window: same_task
        operator: ">="
        value: 1
    set: bug_catcher
    hint: Wait for the right moment — this unlocks when conditions align.
    hint_cn: 等待合适的时机——条件具备时自然解锁。
