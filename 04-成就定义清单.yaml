# Agent Achievement System — 完整成就定义清单
# 版本: 1.0 / 日期: 2026-05-17

definitions:

  # ============================================================
  # Category: Onboarding (入门)
  # ============================================================
  - id: first_contact
    name: Hello World
    name_cn: Hello World
    description: 开启你的第一次Agent对话。
    icon: "👋"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: conversation.message
        operator: ">="
        value: 1

  - id: three_company
    name: Hat Trick
    name_cn: "帽子戏法"
    description: 累计完成 3 个 task，一个好的开始，不是吗？
    icon: "🤝"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 3

  - id: tool_time
    name: I Got Tools
    name_cn: "工具学徒"
    description: agent 执行了第一个 tool call。
    icon: "🔧"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: tool.complete
        operator: ">="
        value: 1

  - id: permission_granted
    name: "Permission Granted"
    name_cn: "门禁卡"
    description: 手动调整过 agent 的权限模式。控制权，你说了算。
    icon: "🔐"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: permission.mode_changed
        operator: ">="
        value: 1

  - id: read_manual
    name: "Read the Manual"
    name_cn: "看说明书"
    description: "打开过 help 或文档。很少有人这么做。"
    icon: "📖"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: help.accessed
        operator: ">="
        value: 1

  - id: first_sunrise
    name: Once Again
    name_cn: "再接再厉"
    description: 24h 内开启 ≥ 2 个 session。你和agent越来越熟悉了。
    icon: "🌅"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: threshold
        event: session.start
        window: 24h
        operator: ">="
        value: 2

  # ── Gap #1: 引导性成就（功能发现） ──
  - id: first_shot
    name: Command & Conquer
    name_cn: 命令与征服
    description: 使用了第一个 slash command。
    icon: "🔫"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: command.slash_used
        operator: ">="
        value: 1

  - id: model_hopper
    name: Model Taste
    name_cn: "换换口味"
    description: "手动切换了一次 AI 模型。总有一款适合你。"
    icon: "🔄"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: model.switch
        operator: ">="
        value: 1

  - id: worktree_trial
    name: Isolation Area
    name_cn: "隔离区"
    description: 使用了worktree 模式工作。代码安全第一。
    icon: "🌲"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: worktree.created
        operator: ">="
        value: 1

  - id: mcp_first_contact
    name: MCP Plug-in
    name_cn: 场外嘉宾
    description: "连接了第一个 MCP server。agent 的能力向外延伸了。"
    icon: "🔌"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: mcp.server_used
        operator: ">="
        value: 1

  - id: visual_prompt
    name: "A Picture's Worth"
    name_cn: "有图有真相"
    description: 给 agent 传了一张图片。
    icon: "🖼️"
    category: onboarding
    rarity: uncommon
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: image.read
        operator: ">="
        value: 1

  # ── Steam-inspired: 功能发现 ──
  - id: dashboard_visitor
    name: "Window Shopper"
    name_cn: "橱窗购物"
    description: 打开过成就 Dashboard。
    icon: "🪟"
    category: onboarding
    rarity: common
    hidden: false
    set: the_beginning
    conditions:
      - type: counter
        event: dashboard.opened
        operator: ">="
        value: 1

  # ============================================================
  # Category: Milestones (里程碑)
  # ============================================================
  - id: double_digits
    name: "Double Digits"
    name_cn: 两位数
    description: "10 个 task 完成。你已经不是新手了。"
    icon: "🔟"
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 10
        window: all

  - id: century
    name: "Century"
    name_cn: 创世纪
    description: 经历了100 个 task。你开始怀疑没有 agent 的日子是怎么过的。
    icon: "💯"
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 100
        window: all

  - id: millennium
    name: "Millennium"
    name_cn: 千禧年
    description: 经历了1000 个 task。你和 agent 已是一种共生关系。
    icon: "🏆"
    category: milestones
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 1000
        window: all

  - id: marathon
    name: "Marathon"
    name_cn: 跑马拉松
    description: 单 session 持续超过 3 小时。不考虑上个卫生间吗？
    icon: "🏃"
    category: milestones
    rarity: uncommon
    hidden: false
    conditions:
      - type: threshold
        event: session.end
        field: duration_ms
        operator: ">="
        value: 10800000  # 3h in ms

  - id: streak_7
    name: "Streak 7"
    name_cn: 连续7天使用
    description: "连续 7 天使用。agent 已经是你的日常。"
    icon: "🔥"
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 7

  - id: streak_30
    name: "Streak 30"
    name_cn: 连续30天使用
    description: 连续 30 天使用。不仅是工具，是生活方式。
    icon: "📅"
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 30

  - id: streak_100
    name: "Streak 100"
    name_cn: 连续 100 天使用
    description: 连续 100 天使用。你确定自己不是在和Agent谈恋爱？
    icon: "🎬"
    category: milestones
    rarity: legendary
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 100

  - id: polyglot
    name: "Polyglot"
    name_cn: 多语言人士
    description: "agent 对话涉及过 5 种以上编程语言。"
    icon: "🌐"
    category: milestones
    rarity: uncommon
    hidden: false
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        operator: ">="
        value: 5

  # ── Steam-inspired: 三档递进（Factorio 模式） ──
  - id: half_century
    name: "Half Century"
    name_cn: 任务过半百
    description: 50 个 task 完成。你不再是新手了。
    icon: "🪙"
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 50
        window: all

  - id: streak_3
    name: "Hat Trick"
    name_cn: "帽子戏法"
    description: "连续 3 天使用。习惯正在养成。比 7 天更近，比明天更远。"
    icon: "🎩"
    category: milestones
    rarity: common
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        operator: ">="
        value: 3

  - id: file_centurion
    name: "File Centurion"
    name_cn: "文件百夫长"
    description: 累计读取了 100 个文件。你见过的代码可不少了。
    icon: "📂"
    category: milestones
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: file.read
        operator: ">="
        value: 100
        window: all

  # ============================================================
  # Category: Skill (技巧)
  # ============================================================
  - id: chain_reaction
    name: "Chain Reaction"
    name_cn: 链式反应
    description: "单次对话中 agent 完成 5 步以上连续 tool call。"
    icon: "⛓️"
    category: skill
    rarity: uncommon
    hidden: false
    set: agent_commander
    conditions:
      - type: counter
        event: tool.complete
        window: single_session
        operator: ">="
        value: 5

  - id: full_auto
    name: "Full Auto"
    name_cn: 自动档
    description: 10 步以上 tool调用，全程自主零拒绝。
    icon: "🤖"
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: sequence
        event: tool.complete
        window: single_session
        consecutive: true
        count:
          operator: ">="
          value: 10
      - type: counter
        event: tool.deny
        window: same_session
        operator: "=="
        value: 0

  - id: architect
    name: "Architect"
    name_cn: 建筑师
    description: "单 task 中 agent 成功编辑了 5 个以上文件。"
    icon: "🏗️"
    category: skill
    rarity: rare
    hidden: false
    set: agent_commander
    conditions:
      - type: distinct_count
        event: file.edit
        field: file_path
        window: single_task
        operator: ">="
        value: 5

  - id: surgeon
    name: "Surgeon"
    name_cn: 外科手术
    description: 单 task中，你只改了恰好需要的那一点点。
    icon: "🩺"
    category: skill
    rarity: epic
    hidden: false
    set: agent_commander
    conditions:
      - type: threshold
        metric: "edit_lines / total_file_lines"
        window: single_task
        operator: "<"
        value: 0.05
      - type: event
        event: task.complete
        window: same_task

  - id: seeker
    name: "Seeker"
    name_cn: 探索者
    description: 单 session 中搜索类 tool ≥ 10 次。
    icon: "🔍"
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['grep','glob','web_search','web_fetch']"
        window: single_session
        operator: ">="
        value: 10

  - id: the_debugger
    name: "The Debugger"
    name_cn: 捉虫行动
    description: 代码报错，你让agent自己修好了。
    icon: "🐛"
    category: skill
    rarity: uncommon
    hidden: false
    set: the_bug_catcher
    conditions:
      - type: sequence
        events: ["test.fail", "agent.self_fix", "test.pass"]
        window: single_task

  - id: triple_debugger
    name: "Triple Debugger"
    name_cn: 三重调试
    description: "单 task 中 agent 自修复 ≥ 3 次错误。"
    icon: "🪲"
    category: skill
    rarity: rare
    hidden: false
    set: the_bug_catcher
    conditions:
      - type: sequence_count
        pattern: ["test.fail", "agent.self_fix", "test.pass"]
        window: single_task
        operator: ">="
        value: 3

  # ── Gap #2: 强迫多样性成就 ──
  - id: tool_completist
    name: "Tool Completist"
    name_cn: 工具大全
    description: 单 session 中使用过全部核心 tool（Read / Edit / Write / Bash / Think）。
    icon: "🧰"
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_name
        values: ["Read", "Edit", "Write", "Bash", "ToolSearch"]
        window: single_session
        operator: ">="
        value: 5

  - id: the_switch
    name: Shift Gears
    name_cn: 模式换档
    description: 同一次 task 中从 Plan 模式切换到非Plan模式，完成最终实现。
    icon: "🎭"
    category: skill
    rarity: uncommon
    hidden: false
    conditions:
      - type: sequence
        events: ["plan.mode_entered", "agent.mode_activated", "task.complete"]
        window: single_task

  # ── Steam-inspired: Factorio 限制性挑战 + BG3 复合条件 ──
  - id: off_the_grid
    name: "Off the Grid"
    name_cn: "离线模式"
    description: 完成一个 task，全程未使用搜索工具（WebSearch/WebFetch）。
    icon: "🏝️"
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: event
        event: task.complete
        window: single_task
      - type: counter
        event: tool.complete
        filter: "tool_name in ['web_search','web_fetch']"
        window: same_task
        operator: "=="
        value: 0

  - id: first_try
    name: Smooth Criminal
    name_cn: 一次就过
    description: agent 写完代码后第一次测试就直接通过，中间无失败，非常丝滑。
    icon: "🐞"
    category: skill
    rarity: rare
    hidden: false
    conditions:
      - type: event
        event: test.pass
        window: single_task
      - type: counter
        event: test.fail
        window: same_task
        operator: "=="
        value: 0
      - type: counter
        event: file.edit
        window: same_task
        operator: ">="
        value: 1

  - id: terminal_only
    name: "Terminal Only"
    name_cn: 纯终端玩法
    description: 完成一个 task只用终端命令，零文件编辑。简单、老派，但有效。
    icon: "💻"
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: event
        event: task.complete
        window: single_task
      - type: counter
        event: tool.complete
        filter: "tool_name in ['edit','write']"
        window: same_task
        operator: "=="
        value: 0
      - type: counter
        event: tool.complete
        filter: "tool_name in ['bash','terminal','execute']"
        window: same_task
        operator: ">="
        value: 1

  # ============================================================
  # Category: Style (风格)
  # ============================================================
  - id: minimalist
    name: "Minimalist"
    name_cn: 极简主义
    description: prompt 长度 ≤ 80 字符，惜字如金。
    icon: "🪶"
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: threshold
        metric: "length"
        event: conversation.message
        operator: "<="
        value: 80
        window: all

  - id: novelist
    name: "Novelist"
    name_cn: 小说家
    description: prompt 长度 ≥ 500 字符，你很细心！
    icon: "📝"
    category: style
    rarity: epic
    hidden: false
    conditions:
      - type: threshold
        metric: "length"
        event: conversation.message
        operator: ">="
        value: 500
        window: all

  - id: one_shot
    name: "One Shot"
    name_cn: 一发入魂
    description: "单 task 只问了 agent 一次就完成。"
    icon: "🎯"
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        operator: "=="
        value: 1

  - id: iterative_refiner
    name: "Iterative Refiner"
    name_cn: 慢工出细活
    description: 单 task 交互 > 20 轮才完成。
    icon: "🔄"
    category: style
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        event: task.complete
        field: step_count
        operator: ">"
        value: 20

  - id: night_owl
    name: "Night Owl"
    name_cn: 夜猫子
    description: 启动session在凌晨 (0:00-5:00)。
    icon: "🦉"
    category: style
    rarity: uncommon
    hidden: true
    set: night_shift
    conditions:
      - type: mode
        event: session.start
        field: hour
        in_range: [0, 5]
        threshold: 0.5  # >50% in this range

  - id: weekend_warrior
    name: Not Invited to Party
    name_cn: 开趴不邀请我
    description: session在周末，你没有去参加派对吗？
    icon: "⚔️"
    category: style
    rarity: uncommon
    hidden: true
    set: night_shift
    conditions:
      - type: mode
        event: session.start
        field: day_of_week
        in_range: [0, 6]  # Sat=0, Sun=6
        threshold: 0.5

  - id: copy_paste_king
    name: Copy-Paste is All You Need
    name_cn: Ctrl C + Ctrl V就好了
    description: 粘贴内容 / 总输入 > 50%。
    icon: "📋"
    category: style
    rarity: uncommon
    hidden: false
    conditions:
      - type: ratio
        numerator: "paste_chars"
        denominator: "total_input_chars"
        operator: ">"
        value: 0.5

  # ============================================================
  # Category: Tool Mastery (工具大师)
  # ============================================================
  - id: file_whisperer
    name: File Shepherd
    name_cn: 文件牧羊人
    description: "累计让 agent 编辑了 500 个文件。"
    icon: "📁"
    category: tool_mastery
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: file.edit
        operator: ">="
        value: 500
        window: all

  - id: git_wizard
    name: "Git Wizard"
    name_cn: Git魔法师
    description: "agent 参与了 100 次 git commit。"
    icon: "🧙"
    category: tool_mastery
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: git.commit
        filter: "agent_involved == true"
        operator: ">="
        value: 100
        window: all

  - id: shell_shocker
    name: Ghost in the Shell
    name_cn: 攻“壳”机动队
    description: 你让agent 在终端执行了 250 次命令。
    icon: "💻"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['bash','terminal','execute']"
        operator: ">="
        value: 250
        window: all

  - id: web_wanderer
    name: Webmancer
    name_cn: 网络漫游者
    description: "agent 上网搜索了 100 次。"
    icon: "🌍"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: tool.complete
        filter: "tool_name in ['web_search','web_fetch']"
        operator: ">="
        value: 100
        window: all

  - id: parallel_universe
    name: "Parallel Universe"
    name_cn: 平行宇宙
    description: 你在同一项目上，同时有 ≥ 3 个 active session。
    icon: "🌌"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: threshold
        metric: "concurrent_sessions"
        window: same_project
        operator: ">="
        value: 3

  - id: mcp_explorer
    name: "MCP Explorer"
    name_cn: MCP 探索者
    description: "连接并使用过 5 个以上 MCP server。"
    icon: "🔌"
    category: tool_mastery
    rarity: epic
    hidden: false
    set: collectors_soul
    progress_trackable: true
    conditions:
      - type: distinct_count
        event: mcp.server_used
        operator: ">="
        value: 5

  - id: image_whisperer
    name: More than meets the eye
    name_cn: 不只眼前所见
    description: Agent读图次数>=5次。
    icon: "📸"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: image.read
        operator: ">="
        value: 5

  # ── Steam-inspired: Factorio 失败庆祝 ──
  - id: undo_master
    name: Take back a Move
    name_cn: 悔棋
    description: "累计撤回了 agent 的修改 25 次。完美需要反复打磨。"
    icon: "↩️"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: file.revert
        operator: ">="
        value: 25
        window: all

  - id: git_tenderfoot
    name: Git Scouting
    name_cn: Git 童子军
    description: agent 参与了 10 次 git commit。
    icon: "🐾"
    category: tool_mastery
    rarity: common
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: git.commit
        filter: "agent_involved == true"
        operator: ">="
        value: 10
        window: all

  - id: git_veteran
    name: "Git Veteran"
    name_cn: "Git 老兵"
    description: "agent 参与了 250 次 git commit。你们的协作已经超越了代码——是信任。"
    icon: "🎖️"
    category: tool_mastery
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: git.commit
        filter: "agent_involved == true"
        operator: ">="
        value: 250
        window: all

  # ============================================================
  # Category: Workflow (工作流)
  # ============================================================
  - id: pr_champion
    name: "PR Champion"
    name_cn: PR 冠军
    description: 通过 agent 创建了你的第一个 PR。
    icon: "🔀"
    category: workflow
    rarity: uncommon
    hidden: false
    set: devops_triad
    conditions:
      - type: counter
        event: git.pr_created
        filter: "agent_involved == true"
        operator: ">="
        value: 1

  - id: cicd_pioneer
    name: "CI/CD Pioneer"
    name_cn: CI/CD 先驱
    description: agent 帮你创建了 GitHub Actions workflow 文件。
    icon: "⚙️"
    category: workflow
    rarity: rare
