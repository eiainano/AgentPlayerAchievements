definitions:
  - id: first_contact
    name: Hello World
    name_cn: Hello World
    description: Start your first agent conversation.
    description_cn: 开启你的第一次Agent对话。
    icon: 👋
    category: onboarding
    rarity: common
    hidden: false
    tip: Talk to Claude like a colleague. The more specific your request, the better the output. "Write a React login
      component with form validation" beats "make a login page" every time.
    tip_cn: 跟 Claude 像同事一样对话。诉求越具体，输出质量越高。“写一个 React 登录组件”比“写个登录页”好十倍。
    hint: Say hello and start your first conversation
    hint_cn: 打个招呼，开启你的第一次对话
    set: the_beginning
    conditions:
      - type: counter
        event: conversation.message
        operator: ">="
        value: 1
  - id: three_company
    name: Hat Trick
    name_cn: 帽子戏法
    description: 3 tasks completed — a good start, isn't it?
    description_cn: 累计完成 3 个 task，一个好的开始，不是吗？
    icon: 🤝
    category: onboarding
    rarity: common
    hidden: false
    tip: Break complex work into tasks. Claude tracks progress per task and marks completion automatically. Big refactor?
      Start with a task list.
    tip_cn: 把复杂工作拆成 task。Claude 会根据 task 追踪进度，还能自动标记完成状态。大的重构？先列 task 清单。
    hint: Complete a few tasks and see what happens
    hint_cn: 完成几个 task，看看会发生什么
    set: the_beginning
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 3
  - id: tool_time
    name: Prometheus
    name_cn: 普罗米修斯
    description: Your agent executed its first tool call.
    description_cn: agent 执行了第一个 tool call。
    icon: 🔧
    category: onboarding
    rarity: common
    hidden: false
    tip: "Agents use tools like Read, Write, Bash, Search, WebFetch. The pros chain them: read code → analyze → edit → run
      tests — all in one flow."
    tip_cn: Agent 能调用 Read、Write、Bash、Search、WebFetch 等工具。真正的高手善于组合工具——读取代码→分析问题→编辑修复→运行测试，一气呵成。
    hint: Ask Claude to read a file or write some code for you
    hint_cn: 让 Claude 帮你读一个文件或写一段代码
    set: the_beginning
    conditions:
      - type: counter
        event: tool.complete
        operator: ">="
        value: 1
  - id: permission_granted
    name: Permission Granted
    name_cn: 门禁卡
    description: Manually adjusted the agent's permission mode. You're in control.
    description_cn: 手动调整过 agent 的权限模式。控制权，你说了算。
    icon: 🔐
    category: onboarding
    rarity: common
    hidden: false
    tip: Permission modes control when Claude asks for approval. Default mode for supervision, relaxed for trusted flows.
      Find your safety-efficiency sweet spot.
    tip_cn: 权限模式控制 Claude 何时需要你确认。默认模式适合监督，宽松模式适合信任流程。找到安全与效率的平衡点。
    hint: Take control — adjust how Claude asks for your permission
    hint_cn: 掌控 Claude 的权限行为——调整一下权限模式
    set: the_beginning
    conditions:
      - type: counter
        event: permission.mode_changed
        operator: ">="
        value: 1
  - id: read_manual
    name: Read the Manual
    name_cn: 看说明书
    description: Opened help or documentation. Few people do this.
    description_cn: 打开过 help 或文档。很少有人这么做。
    icon: 📖
    category: onboarding
    rarity: common
    hidden: false
    tip: /help is your built-in quick reference, faster than Googling. All slash commands, plan mode docs, config reference
      — it's all there.
    tip_cn: /help 是内置快速参考，比 Google 快。想看所有 slash command、了解 plan mode、查配置？都在 help 里。
    hint: There's a built-in manual. Type /help to find it.
    hint_cn: 内置手册就在手边，找到它
    set: the_beginning
    conditions:
      - type: counter
        event: help.accessed
        operator: ">="
        value: 1
  - id: first_sunrise
    name: Once Again
    name_cn: 再接再厉
    description: Started 2+ sessions within 24 hours. You and your agent are getting closer.
    description_cn: 24h 内开启 ≥ 2 个 session。你和agent越来越熟悉了。
    icon: 🌅
    category: onboarding
    rarity: common
    hidden: false
    tip: Claude Code retains context between sessions. Come back tomorrow and Claude remembers what you were doing. Leverage
      session continuity.
    tip_cn: Claude Code 在 session 之间保留上下文。隔天回来继续工作，Claude 还记得你们在做什么。善用 session 连续性。
    hint: Come back for another session within a day — your agent misses you
    hint_cn: 24 小时内再开一次 session，和老朋友重逢
    set: the_beginning
    conditions:
      - type: threshold
        event: session.start
        window: 24h
        operator: ">="
        value: 2
  - id: first_shot
    name: Command & Conquer
    name_cn: 命令与征服
    description: Used your first slash command.
    description_cn: 使用了第一个 slash command。
    icon: 🔫
    category: onboarding
    rarity: common
    hidden: false
    tip: Slash commands are shortcuts for common actions. Type / then Tab to see all available commands. /help, /compact,
      /model are daily essentials.
    tip_cn: slash command 是常用操作的快捷方式。输入 / 然后 tab 查看所有可用命令。/help、/compact、/model 都是日常必备。
    hint: Type a slash command — like a cheat code in your terminal
    hint_cn: 输入一个斜杠命令——就像控制台里的秘籍
    set: the_beginning
    conditions:
      - type: counter
        event: command.slash_used
        operator: ">="
        value: 1
  - id: model_hopper
    name: Model Taste
    name_cn: 换换口味
    description: Switched AI models manually. There's one for every mood.
    description_cn: 手动切换了一次 AI 模型。总有一款适合你。
    icon: 🔄
    category: onboarding
    rarity: common
    hidden: false
    tip: Different models, different strengths. Opus for complex reasoning and architecture, Sonnet for rapid iteration,
      Haiku for simple tasks. /model to switch anytime.
    tip_cn: 不同模型各有所长。Opus 适合复杂推理和架构设计，Sonnet 适合快速迭代，Haiku 适合简单任务。用 /model 随时切换。
    hint: Try a different AI model — variety is the spice of coding
    hint_cn: 换一个 AI 模型试试，总有一款适合你
    set: the_beginning
    conditions:
      - type: counter
        event: model.switch
        operator: ">="
        value: 1
  - id: worktree_trial
    name: Isolation Area
    name_cn: 隔离区
    description: Used worktree isolation. Code safety first.
    description_cn: 使用了worktree 模式工作。代码安全第一。
    icon: 🌲
    category: onboarding
    rarity: common
    hidden: false
    tip: Worktrees isolate changes in a sandbox — your original code stays untouched. Perfect for risky refactors and
      experiments.
    tip_cn: Worktree 隔离文件修改在沙盒中，不影响原代码。适合大范围重构、实验性改动。安全第一。
    hint: Take your code to an isolated workspace for safe experimentation
    hint_cn: 把你的代码带到隔离区去工作
    set: the_beginning
    conditions:
      - type: counter
        event: worktree.created
        operator: ">="
        value: 1
  - id: mcp_first_contact
    name: MCP Plug-in
    name_cn: 场外嘉宾
    description: Connected your first MCP server. Your agent's reach just expanded.
    description_cn: 连接了第一个 MCP server。agent 的能力向外延伸了。
    icon: 🔌
    category: onboarding
    rarity: common
    hidden: false
    tip: MCP connects Claude to external tools — databases, cloud services, custom APIs. Configure in .mcp.json and Claude
      auto-discovers them.
    tip_cn: MCP 让 Claude 连接外部工具和 API——数据库、云服务、自定义接口。在 .mcp.json 中配置，Claude 自动发现。
    hint: Connect Claude to an external service — expand its reach
    hint_cn: 给 Claude 接通外部工具——让它不再局限于本地
    set: the_beginning
    conditions:
      - type: counter
        event: mcp.server_used
        operator: ">="
        value: 1
  - id: visual_prompt
    name: A Picture's Worth
    name_cn: 有图有真相
    description: Agent read an image you shared. Visual context unlocked.
    description_cn: agent 读取了你分享的图片。视觉上下文已解锁。
    icon: 🖼️
    category: onboarding
    rarity: common
    hidden: false
    tip: Claude reads screenshots, diagrams, PDFs, UI mockups. Debugging a UI issue? Share a screenshot — it's more precise
      than describing it.
    tip_cn: Claude 能读取截图、架构图、PDF、UI mockup。遇到复杂的 UI 问题？直接截图给 Claude，比描述文字准确。
    hint: Share an image with Claude — a picture is worth a thousand words
    hint_cn: 分享一张图片给 Claude——一图胜千言
    set: the_beginning
    conditions:
      - type: counter
        event: image.read
        operator: ">="
        value: 1
  - id: dashboard_visitor
    name: Window Shopper
    name_cn: 橱窗购物
    description: Opened the achievement Dashboard.
    description_cn: 打开过成就 Dashboard。
    icon: 🪟
    category: onboarding
    rarity: common
    hidden: false
    tip: The Dashboard tracks your achievement progress, XP, rarity stats, and set collections. Run `npm run dashboard` from
      the project directory.
    tip_cn: Dashboard 追踪你的成就进度、XP、稀有度统计、套装收集。在项目目录运行 npm run dashboard 打开。
    hint: There's an achievement dashboard. Can you find it?
    hint_cn: 成就系统有一个 Web 面板——打开看看
    set: the_beginning
    conditions:
      - type: counter
        event: dashboard.opened
        operator: ">="
        value: 1
  - id: automode_first
    name: Cruise Control
    name_cn: 巡航模式
    description: Activated automode for the first time. Let the agent steer.
    description_cn: 首次激活 automode。让 agent 自己开一会儿。
    icon: ⛵
    category: onboarding
    rarity: common
    hidden: false
    tip: Automode lets Claude work autonomously on long tasks without per-step approval. Great for batch refactors and
      multi-file changes. Review periodically.
    tip_cn: Automode 让 Claude 自主执行长任务，无需逐个确认。适合批量重构、多文件修改。定期 review 进度即可。
    hint: Let Claude drive autonomously for a while
    hint_cn: 让 Claude 自己开一会儿——激活自动驾驶模式
    set: the_beginning
    conditions:
      - type: counter
        event: automode.start
        operator: ">="
        value: 1
  - id: mcp_first_connect
    name: Signal Established
    name_cn: 信号接通
    description: Connected to an MCP server for the first time.
    description_cn: 首次连接到 MCP server。
    icon: 📡
    category: onboarding
    rarity: common
    hidden: false
    tip: Once an MCP connection is established, Claude can call remote services. From database queries to automated deploys
      — MCP brings your toolchain into the conversation.
    tip_cn: MCP 连接建立后，Claude 可以调用远程服务。从数据库查询到自动化部署，MCP 把你的工具链带入对话中。
    hint: Establish a connection to an external server
    hint_cn: 建立一条通往外部服务器的连接
    set: the_beginning
    conditions:
      - type: counter
        event: mcp.connect
        operator: ">="
        value: 1
  - id: task_creator
    name: Task Manager
    name_cn: 任务管理器
    description: Manually created 5 tasks. Organization is a superpower.
    description_cn: 手动创建了 5 个 task。规划是一种超能力。
    icon: 📋
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Create several tasks — organization is a superpower
    hint_cn: 多创建几个 task——规划是一种超能力
    conditions:
      - type: counter
        event: task.create
        operator: ">="
        value: 5
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: task_updater
    name: Status Report
    name_cn: 进度汇报
    description: Updated task status 10 times. You track progress like a pro.
    description_cn: 更新了 10 次 task 状态。项目管理，专业水准。
    icon: 📊
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Keep updating task statuses as you make progress
    hint_cn: 持续更新 task 状态，跟踪项目进度
    conditions:
      - type: counter
        event: task.update
        operator: ">="
        value: 10
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: error_resilient
    name: Error Resilient
    name_cn: 容错强者
    description: Agent hit 5 errors and kept going. What doesn't kill you…
    description_cn: agent 遭遇 5 次错误依然继续。杀不死你的只会让你更强。
    icon: 🛡️
    category: tool_mastery
    rarity: uncommon
    hidden: false
    hint: Errors are learning opportunities. Keep going despite them.
    hint_cn: 错误是学习的机会。让 Claude 从错误中继续。
    conditions:
      - type: counter
        event: error.occurred
        operator: ">="
        value: 5
    tip: Errors are learning opportunities. When a tool fails, Claude sees the error message and can self-correct. The best
      developers read error messages carefully — Claude can explain what went wrong and why.
    tip_cn: 错误是学习的机会。当工具调用失败时，Claude 能看到错误信息并自我修正。最好的开发者会仔细阅读错误信息——Claude 能解释错误原因和根源。
  - id: file_purger
    name: Spring Cleaning
    name_cn: 大扫除
    description: Deleted 10 files. Sometimes less is more.
    description_cn: 删除了 10 个文件。少即是多。
    icon: 🧹
    category: tool_mastery
    rarity: uncommon
    hidden: false
    hint: Clean up some unused files — sometimes less is more
    hint_cn: 清理一些不需要的文件——少即是多
    conditions:
      - type: counter
        event: file.delete
        operator: ">="
        value: 10
    tip: Dead code is technical debt. Periodically clean up unused files — it reduces cognitive load and makes the codebase
      more maintainable. Claude can help identify files that are no longer referenced.
    tip_cn: 死代码就是技术债。定期清理无用文件能降低认知负担、提高可维护性。Claude 能帮你识别不再被引用的文件。
  - id: dual_wielder
    name: Three-Sword Style
    name_cn: 三刀流
    description: Used 3+ different tools in a single task. Santoryu — three swords, one warrior.
    description_cn: 同一个 task 里用了 3 种以上不同工具。三刀流——三把刀，一个剑士。
    icon: ⚔️
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Use multiple different tools within a single task
    hint_cn: 在同一个 task 里多用几种不同工具
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_name
        window: single_task
        operator: ">="
        value: 3
    set: tool_connoisseur
    tip: "Each tool has a specific strength: Read for analysis, Write for creation, Edit for modification, Bash for
      execution, Search for discovery. The pro knows which tool fits which job."
    tip_cn: 每个工具有独特的优势：Read 用于分析，Write 用于创建，Edit 用于修改，Bash 用于执行，Search 用于发现。高手知道哪个工具适合哪项工作。
  - id: double_digits
    name: Double Digits
    name_cn: 两位数
    description: 10 tasks completed. You're no longer a beginner.
    description_cn: 10 个 task 完成。你已经不是新手了。
    icon: 🔟
    category: milestones
    rarity: uncommon
    hidden: false
    hint: Keep completing tasks — you'll hit a milestone soon
    hint_cn: 完成任务是一个积累的过程。继续努力。
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 10
        window: all
    tip: Tasks are the atomic unit of work in Claude Code. Break each feature into small, focused tasks (one file change,
      one test, one commit). Claude tracks progress and reports completion — use this to structure your workflow.
    tip_cn: Task 是 Claude Code 中的基本工作单元。把每个功能拆成小而专注的 task（一个文件改动、一个测试、一个提交）。Claude 会自动追踪进度并报告完成状态——用这个来组织你的工作流。
  - id: century
    name: Century
    name_cn: 创世纪
    description: 100 tasks completed. You wonder how you ever worked without an agent.
    description_cn: 经历了100 个 task。你开始怀疑没有 agent 的日子是怎么过的。
    icon: 💯
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 100
        window: all
    hint: Complete tasks to make progress on your project.
    hint_cn: 完成任务来推进你的项目。
  - id: millennium
    name: Millennium
    name_cn: 千禧年
    description: 1,000 tasks completed. You and your agent are now symbiotic.
    description_cn: 经历了1000 个 task。你和 agent 已是一种共生关系。
    icon: 🏆
    category: milestones
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 1000
        window: all
    hint: Complete tasks to make progress on your project.
    hint_cn: 完成任务来推进你的项目。
  - id: marathon
    name: Marathon
    name_cn: 跑马拉松
    description: Single session lasting over 3 hours. Maybe take a bathroom break?
    description_cn: 单 session 持续超过 3 小时。不考虑上个卫生间吗？
    icon: 🏃
    category: milestones
    rarity: uncommon
    hidden: false
    hint: A long, focused session produces more. Go deep.
    hint_cn: 持久的 session 能产出更多。来一次深度工作。
    conditions:
      - type: threshold
        event: session.end
        field: duration_ms
        operator: ">="
        value: 10800000
        per_event: true
    set: endurance
    tip: Pushing past your usual limits often leads to the most learning. Try going a little further than you normally
      would.
    tip_cn: 突破常规限制往往带来最多的学习。试试比你平常做得更多一点。
  - id: streak_7
    name: Streak 7
    name_cn: 连续7天使用
    description: 7 consecutive days of use. Your agent is part of your daily routine.
    description_cn: 连续 7 天使用。agent 已经是你的日常。
    icon: 🔥
    category: milestones
    rarity: uncommon
    hidden: false
    hint: Show up every day for a week — build the habit
    hint_cn: 每天来干一点，连续一周，习惯就养成了
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        window: all
        operator: ">="
        value: 7
    set: endurance
    tip: Consistency compounds. Using Claude daily builds familiarity with both the tool and your codebase. Even short
      sessions maintain momentum — the streak matters more than the session length.
    tip_cn: 积累效应。每天使用 Claude 能建立对工具和代码库的熟悉度。即使是短 session 也能保持 momentum——连续天数比单次时长更重要。
  - id: streak_30
    name: Streak 30
    name_cn: 连续30天使用
    description: 30 consecutive days of use. It's not just a tool anymore — it's a lifestyle.
    description_cn: 连续 30 天使用。不仅是工具，是生活方式。
    icon: 📅
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        window: all
        operator: ">="
        value: 30
    set: endurance
    hint: Show up consistently — habits are built one day at a time.
    hint_cn: 每天坚持来——习惯是靠一天天积累的。
  - id: streak_100
    name: Streak 100
    name_cn: 连续 100 天使用
    description: 100 consecutive days of use. Are you sure you're not dating your agent?
    description_cn: 连续 100 天使用。你确定自己不是在和Agent谈恋爱？
    icon: 🎬
    category: milestones
    rarity: mythic
    hidden: false
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        window: all
        operator: ">="
        value: 100
    set: endurance
    hint: Show up consistently — habits are built one day at a time.
    hint_cn: 每天坚持来——习惯是靠一天天积累的。
  - id: polyglot
    name: Polyglot
    name_cn: 多语言人士
    description: Used 5+ programming languages in agent conversations.
    description_cn: agent 对话涉及过 5 种以上编程语言。
    icon: 🌐
    category: milestones
    rarity: uncommon
    hidden: false
    hint: Switch between different programming languages
    hint_cn: 在不同的编程语言之间切换
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        operator: ">="
        value: 5
    tip: Different languages have different strengths. TypeScript for type safety, Python for data work, Rust for
      performance. The polyglot developer picks the right tool for each job.
    tip_cn: 不同语言有不同优势。TypeScript 强类型安全、Python 数据处理、Rust 高性能。多语言开发者能为每项工作选对工具。
  - id: half_century
    name: Half Century
    name_cn: 任务过半百
    description: 50 tasks completed. You're past the rookie phase.
    description_cn: 50 个 task 完成。你不再是新手了。
    icon: 🪙
    category: milestones
    rarity: rare
    hidden: false
    progress_trackable: true
    conditions:
      - type: counter
        event: task.complete
        operator: ">="
        value: 50
        window: all
    hint: Complete tasks to make progress on your project.
    hint_cn: 完成任务来推进你的项目。
  - id: streak_3
    name: Three-Day Streak
    name_cn: 三日连击
    description: 3 consecutive days of use. A habit is forming.
    description_cn: 连续 3 天使用。习惯正在养成。比 7 天更近，比明天更远。
    icon: 🎩
    category: milestones
    rarity: common
    hidden: false
    hint: Come work with Claude three days in a row
    hint_cn: 连续三天来和 Claude 一起工作
    progress_trackable: true
    conditions:
      - type: streak
        event: session.start
        unit: day
        window: all
        operator: ">="
        value: 3
    set: endurance
    tip: Consistency compounds. Using Claude daily builds familiarity with both the tool and your codebase. Even short
      sessions maintain momentum — the streak matters more than the session length.
