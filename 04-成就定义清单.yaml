    name: "Delegator"
    name_cn: "放权大师"
    description: "agent 派出了 5 个子 agent。懂分权才是好领导。"
    icon: "👥"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        operator: ">="
        value: 5

  - id: swat_team
    name: "SWAT Team"
    name_cn: "特种小队"
    description: "agent 同时保持 2-4 个子 agent 工作。小而精的战术单元。"
    icon: "🎯"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        window: single_session
        operator: ">="
        value: 2
      - type: counter
        event: agent.spawn
        window: single_session
        operator: "<="
        value: 4

