      (test). The fewer turns per task, the faster you ship."
    tip_cn: 串联工具是提升效率的关键。典型工作流：Read（理解）→ Plan（思考）→ Edit（修改）→ Bash（测试）。每个 task 的交互轮数越少，你交付得越快。
  - id: self_aware
    name: Self-Aware
    name_cn: 自知之明
    name_es: "Autoconsciente"
    name_ko: "자아 인식"
    name_ja: "自己認識"
    description: Agent triggered a self-fix for the first time. Acknowledged the mistake, fixed it.
    description_cn: agent 首次触发自修复。我犯错了，我修好了。
    description_es: "El agente se auto-reparó por primera vez. Vio el error y lo corrigió."
    description_ko: "에이전트가 처음으로 자체 수정을 실행했다. 실수를 인정하고 스스로 고쳤다."
    description_ja: "エージェントが初めて自己修復を発動。ミスを認めて自分で直した。"
