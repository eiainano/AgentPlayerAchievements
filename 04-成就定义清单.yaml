    description: "一个命令执行超过了 60 秒。耐心，是一种美德……也可能是死循环。"
    icon: "♾️"
    category: hidden
    rarity: uncommon
    hidden: true
    conditions:
      - type: threshold
        event: command.run
        field: duration_ms
        operator: ">="
        value: 60000

  - id: undying_curiosity
    name: "Undying Curiosity"
    name_cn: "不死的好奇心"
    description: "单 session 中发起了 50 次不同的搜索。你到底在研究什么？"
    icon: "🔬"
    category: hidden
    rarity: epic
    hidden: true
    conditions:
      - type: distinct_count
        event: tool.complete
        field: tool_input
        filter: "tool_name in ['web_search','web_fetch']"
        window: single_session
        operator: ">="
        value: 50

  # ── End Steam-inspired ──

  # ============================================================
  # Category: Challenge (挑战)
  # ============================================================

  # ── Steam-inspired: 时间+行为组合 + 限制性挑战 ──
  - id: silent_night
    name: "Silent Night"
    name_cn: "静夜思"
    description: "在凌晨（0:00-5:00）完成了一个 task。最好的代码诞生在黑暗中。"
    icon: "🌙"
    category: challenge
    rarity: rare
    hidden: false
    challenge: true
    conditions:
      - type: event
        event: task.complete
        window: single_task
      - type: mode
        event: session.start
        field: hour
        in_range: [0, 5]
        threshold: 0.5

  - id: polyglot_challenge
    name: Polyglot Fetish
    name_cn: 跨语言爱好者
    description: 单个 task 中涉及了 3 种以上的编程语言。
    icon: "🗣️"
    category: challenge
    rarity: rare
    hidden: false
    challenge: true
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        window: single_task
        operator: ">="
        value: 3

  - id: speed_run_bronze
    name: "Speed Run (Bronze)"
    name_cn: 速通(铜牌)
    description: "3 分钟内完成完整 task：需求→代码→测试通过。"
    icon: "⏱️"
    category: challenge
    rarity: epic
    hidden: false
    set: speed_demon
    challenge: true
    conditions:
      - type: threshold
        event: task.complete
        field: duration_ms
        operator: "<="
        value: 180000
      - type: event
        event: test.pass
        window: same_task

  - id: speed_run_silver
    name: "Speed Run (Silver)"
    name_cn: 速通(银牌)
    description: "1 分钟内完成。"
    icon: "⚡"
    category: challenge
    rarity: legendary
    hidden: false
    set: speed_demon
    challenge: true
    conditions:
      - type: threshold
        event: task.complete
        field: duration_ms
        operator: "<="
        value: 60000
      - type: event
        event: test.pass
        window: same_task

  - id: no_edit_challenge
    name: "No Edit Challenge"
    name_cn: 零编辑挑战
    description: "单 task 零手动编辑，全靠 agent。"
    icon: "🎮"
    category: challenge
    rarity: rare
    hidden: false
    challenge: true
    conditions:
      - type: counter
        event: output.edit
        window: single_task
        operator: "=="
        value: 0
      - type: event
        event: task.complete
        window: same_task

  - id: ten_task_no_edit
    name: "Ten-Task No Edit"
    name_cn: 十连零编辑
    description: "连续 10 个 task 零手动编辑。你是 conductor，不是 editor。"
    icon: "🎼"
    category: challenge
    rarity: legendary
    hidden: false
    progress_trackable: true
    challenge: true
    conditions:
      - type: streak
        event: task.complete
        filter: "manual_edits == 0"
        operator: ">="
        value: 10
        event_level: true

  - id: multi_model
    name: Multi-Model User
    name_cn: 模型换着用
    description: "24h 内使用 3 种不同模型。"
    icon: "🎨"
    category: challenge
    rarity: uncommon
    hidden: false
    set: collectors_soul
    challenge: true
    conditions:
      - type: distinct_count
        event: model.switch
        field: to_model
        window: 24h
        operator: ">="
        value: 3

  # ── Gap #3: 创意挑战 ──
  - id: short_circuit
    name: "Short Circuit"
    name_cn: 短路
    description: "用不到 50 个字符的 prompt 完成了一个完整 task。你没多写一个字。"
    icon: "⚡"
    category: challenge
    rarity: legendary
    hidden: false
    challenge: true
    conditions:
      - type: threshold
        event: task.complete
        field: prompt_length
        operator: "<="
        value: 50
        window: single_task

  # ============================================================
  # Category: Community (社区)
  # ============================================================
  - id: trophy_case
    name: "Trophy Case"
    name_cn: 奖杯柜
    description: "展示柜放满了 6 个成就。"
    icon: "🖼️"
    category: community
    rarity: common
    hidden: false
    conditions:
      - type: threshold
        metric: "showcase_count"
        operator: ">="
        value: 6

  - id: completionist_bronze
    name: "Completionist (Bronze)"
    name_cn: 完美主义(铜牌)
    description: "解锁了所有 Common 成就。"
    icon: "🥉"
    category: community
    rarity: rare
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        rarity: common

  - id: completionist_silver
    name: "Completionist (Silver)"
    name_cn: 完美主义(银牌)
    description: "解锁了所有 Uncommon 及以上成就。"
    icon: "🥈"
    category: community
    rarity: epic
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        rarity: uncommon
        include_above: true

  - id: completionist_gold
    name: "Completionist (Gold)"
    name_cn: 完美主义(金牌)
    description: "解锁了全部非隐藏成就。"
    icon: "🥇"
    category: community
    rarity: legendary
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        exclude_hidden: true

  - id: mythic_completionist
    name: "Mythic Completionist"
    name_cn: 超神完美主义者
    description: "全部成就，包括隐藏。你是第一个吗？"
    icon: "👑"
    category: community
    rarity: mythic
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        all: true

  # ── Gap #2: 跨工具多样性 ──
  - id: cross_agent
    name: Cross-Agent Collector
    name_cn: 跨Agent成就收藏家
    description: "在 2 个不同的 agent 工具上都有成就记录（如 Claude Code + OpenCode）。agent 多面手。"
    icon: "🔗"
    category: community
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: session.start
        field: tool_source
        operator: ">="
        value: 2

  # ============================================================
  # ── Steam-inspired: RDR2 克制设计 — "体验过即可" ──
  - id: casual_collector
    name: "Casual Collector"
    name_cn: "随缘收集"
    description: "解锁了 20 个成就。你不追求全收集，好东西自然来。"
    icon: "🍀"
    category: community
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: threshold
        metric: "total_achievements_unlocked"
        operator: ">="
        value: 20

  # Category: Event-Driven (事件驱动 — 由 hook 自动 emit 但未被引用的 5 个事件)
  # ============================================================

  # ── command.run ──
  - id: pipemaster
    name: "Pipemaster"
    name_cn: "管道大师"
    description: "agent 写出了 10 条带管道的命令。数据在 | 之间流淌。"
    icon: "🔗"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: command.run
        filter: "command contains '|'"
        operator: ">="
        value: 10
        window: all

  - id: command_baby
    name: "Command Baby"
    name_cn: "命令宝宝"
    description: "agent 试过 30 种不同的 shell 命令。它对终端的一切都充满好奇。"
    icon: "👶"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: command.run
        field: command
        operator: ">="
        value: 30
        window: all

  - id: command_master
    name: "Command Master"
    name_cn: "命令大师"
    description: "agent 用过 100 种不同的 shell 命令。它的终端知识已经不在你之下了。"
    icon: "🧙"
    category: tool_mastery
    rarity: legendary
    hidden: false
    conditions:
      - type: distinct_count
        event: command.run
        field: command
        operator: ">="
        value: 100
        window: all

  - id: cerberus
    name: "Cerberus"
    name_cn: "地狱三头犬"
    description: "agent 写出过 3 条带管道的命令。三个头，一条命，无限输出。"
    icon: "🐶"
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: counter
        event: command.run
        filter: "command contains '|'"
        operator: ">="
        value: 3

  # ── tool.failure ──
  - id: fail_forward
    name: "Fail Forward"
    name_cn: "初尝失败"
    description: "agent 第一次遇到工具调用失败。深呼吸，再来一次。"
    icon: "🫤"
    category: workflow
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 1

  - id: bounce_back
    name: "Bounce Back"
    name_cn: "反弹力"
    description: "agent 累计失败 10 次。摔倒了 10 次，站起来了 11 次。"
    icon: "🦘"
    category: workflow
    rarity: uncommon
    hidden: false
    set: agent_commander
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 10
        window: all

  - id: failure_mother
    name: "Failure Is the Mother of Success"
    name_cn: "失败是成功之母"
    description: "agent 累计失败 100 次。它早已不是当初那个菜鸟了。"
    icon: "🧘"
    category: workflow
    rarity: legendary
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 100
        window: all

  - id: phoenix
    name: "Phoenix"
    name_cn: "凤凰涅槃"
    description: "agent 失败后立即在下一次尝试中成功，反复 5 次。浴火重生。"
    icon: "🔥"
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: sequence_count
        pattern: ["tool.failure", "tool.complete"]
        operator: ">="
        value: 5

  # ── mcp.tool_call ──
  - id: mcp_connoisseur
    name: "MCP Connoisseur"
    name_cn: "MCP 品鉴师"
    description: "agent 用过 10 种不同的 MCP tool。不是随便什么工具都用的。"
    icon: "🍷"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 10
        window: all

  - id: mcp_collector
    name: "MCP Collector"
    name_cn: "MCP 收藏家"
    description: "agent 用过 30 种不同的 MCP tool。它不是在用工具，是在收集工具。"
    icon: "🏛️"
    category: tool_mastery
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 30
        window: all

  # ── agent.spawn ──
  - id: delegator
    name: "Delegator"
    name_cn: "放权大师"
    description: "agent 派出了 5 个子 agent。懂分权才是好领导。"
    icon: "👥"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        operator: ">="
        value: 5

  - id: swat_team
    name: "SWAT Team"
    name_cn: "特种小队"
    description: "agent 同时保持 2-4 个子 agent 工作。小而精的战术单元。"
    icon: "🎯"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        window: single_session
        operator: ">="
        value: 2
      - type: counter
        event: agent.spawn
        window: single_session
        operator: "<="
        value: 4

# ============================================================
# Sets (套装)
# ============================================================
sets:
  the_beginning:
    name: "The Beginning"
    achievements: [first_contact, three_company, tool_time, permission_granted, read_manual, first_sunrise, first_shot, model_hopper, worktree_trial, mcp_first_contact, visual_prompt, dashboard_visitor]
    reward: { type: title, value: "Founder" }

  agent_commander:
    name: "Agent Commander"
    achievements: [full_auto, chain_reaction, architect, surgeon, bounce_back]
    reward: { type: showcase_border, value: "gold" }

  the_bug_catcher:
    name: "The Bug Catcher"
    achievements: [the_debugger, triple_debugger]
    reward: { type: stat_counter, value: "bugs_fixed" }

  night_shift:
    name: "Night Shift"
    achievements: [night_owl, weekend_warrior]
    reward: { type: theme, value: "dark" }

  speed_demon:
    name: "Speed Demon"
    achievements: [speed_run_bronze, speed_run_silver]
    reward: { type: animation, value: "fast" }

  collectors_soul:
    name: "Collector's Soul"
    achievements: [agent_collector, mcp_explorer, multi_model]
    reward: { type: title, value: "Tool Collector" }

  devops_triad:
    name: "DevOps Triad"
    achievements: [auto_committer, pr_champion, cicd_pioneer]
    reward: { type: title, value: "DevOps" }

  creator_trifecta:
    name: "Creator Trifecta"
    achievements: [agent_architect, hooks_master, plugin_explorer]
    reward: { type: title, value: "Maker" }

  completionist:
    name: "Completionist"
    achievements: [completionist_bronze, completionist_silver, completionist_gold, mythic_completionist]
    reward: { type: badge, value: "100% Complete" }
