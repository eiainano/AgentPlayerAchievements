  - id: first_try
    name: Smooth Criminal
    name_cn: 尽享丝滑
    name_es: "Cero Fallos"
    name_ko: "완벽한 첫걸음"
    name_ja: "初回完璧"
    description: Agent's first test run passed on the first try — zero failures, smooth as silk.
    description_cn: agent 写完代码后第一次测试就直接通过，中间无失败，非常丝滑。
    description_es: "La primera prueba del agente pasó a la primera. Cero errores, impecable."
    description_ko: "에이전트의 첫 번째 테스트가 오류 없이 한 번에 통과. 완벽한 출발."
    description_ja: "エージェントの初回テストが一発合格。エラーゼロの完璧なスタート。"
