<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="dev-token" content="__DEV_TOKEN__">
  <title>AGPA — Achievements Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="top-nav">
    <div class="nav-inner">
      <span class="nav-brand">🎮 AGPA</span>
      <!-- Profile selector -->
      <div class="profile-selector">
        <button class="profile-btn" id="profile-btn" onclick="toggleProfileDropdown()">
          <span class="profile-icon">👤</span>
          <span id="profile-name-display">default</span>
          <span class="profile-chevron">▾</span>
        </button>
        <div class="profile-dropdown" id="profile-dropdown" style="display:none">
          <div class="profile-dropdown-header" data-i18n="profile_switch">Switch Profile</div>
          <div id="profile-list"></div>
          <div class="profile-dropdown-footer">
            <div class="profile-create" id="profile-create-section">
              <input type="text" id="new-profile-input" data-i18n-placeholder="profile_name_placeholder" placeholder="New profile..."
                     maxlength="32" onkeydown="handleProfileInputKey(event)">
              <button onclick="createProfile()" id="create-profile-btn">+</button>
            </div>
            <div class="profile-limit-hint" id="profile-limit-hint" style="display:none" data-i18n="profile_max">Max 3 profiles</div>
          </div>
        </div>
      </div>
      <div class="nav-links">
        <a href="#profile" class="nav-link active" data-section="profile" data-i18n="nav_profile">Profile</a>
        <a href="#achievements" class="nav-link" data-section="achievements" data-i18n="nav_achievements">Achievements</a>
        <a href="#sets" class="nav-link" data-section="sets" data-i18n="nav_sets">Sets</a>
        <a href="#timeline" class="nav-link" data-section="timeline" data-i18n="nav_timeline">Timeline</a>
      </div>
      <div class="nav-controls">
        <label class="switch" title="Language">
          <span class="switch-label">EN</span>
          <input type="checkbox" id="lang-toggle">
          <span class="switch-track"><span class="switch-knob"></span></span>
          <span class="switch-label">中</span>
        </label>
        <label class="switch" title="Theme">
          <span class="switch-label">☀️</span>
          <input type="checkbox" id="theme-toggle">
          <span class="switch-track"><span class="switch-knob"></span></span>
          <span class="switch-label">🌙</span>
        </label>
        <button id="dev-reset-btn" class="dev-reset-btn" title="Dev: clear all achievements" onclick="devReset()">🗑️</button>
        <span class="nav-stats" id="nav-stats">0/0</span>
      </div>
    </div>
  </nav>

  <!-- Profile Hero -->
  <section id="profile" class="section hero-section">
    <div class="hero-inner">
      <h1 class="hero-title" data-i18n="hero_title">Agent Achievements</h1>
      <div class="xp-bar-container">
        <div class="xp-bar" id="xp-bar">
          <div class="xp-bar-fill" id="xp-bar-fill"></div>
        </div>
        <span class="xp-label" id="xp-label">0 / 0 XP</span>
      </div>
      <div class="showcase" id="showcase"></div>
      <div class="showcase-actions">
        <span id="pick-banner" class="pick-banner" style="display:none">
          <span class="pick-banner-text"></span>
          <button class="pick-cancel-btn" onclick="cancelPick()" data-i18n="pick_cancel">✕ Cancel</button>
        </span>
        <button id="showcase-auto" class="showcase-auto-btn" onclick="autoFillShowcase()" title="Auto-fill with rarest">⚡ Auto</button>
      </div>
      <div class="stats-row" id="stats-row"></div>
    </div>
  </section>

  <!-- Onboarding Guide (0 achievements) -->
  <section id="onboarding-guide" class="section" style="display:none">
    <div class="guide-card">
      <h2 class="guide-title" id="guide-title">Getting Started</h2>
      <p class="guide-subtitle" id="guide-subtitle">Try these easy achievements to get your first unlocks.</p>
      <div class="guide-items" id="guide-items"></div>
    </div>
  </section>

  <!-- Achievement Grid -->
  <section id="achievements" class="section">
    <div class="section-header">
      <h2 data-i18n="section_achievements">Achievements</h2>
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="unlocked">Unlocked</button>
        <button class="filter-tab" data-filter="locked">Locked</button>
      </div>
    </div>
    <div class="section-controls">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" data-i18n-placeholder="search_placeholder" placeholder="Search...">
        <button class="search-clear" id="search-clear" style="display:none" aria-label="Clear">✕</button>
      </div>
      <select id="sort-select" class="sort-select"></select>
    </div>
    <div class="category-nav" id="category-nav"></div>
    <div class="rarity-nav" id="rarity-nav"></div>
    <div class="achievement-grid" id="achievement-grid"></div>
  </section>

  <!-- Sets -->
  <section id="sets" class="section">
    <div class="section-header">
      <h2 data-i18n="section_sets">Sets</h2>
    </div>
    <div class="sets-grid" id="sets-grid"></div>
  </section>

  <!-- Timeline -->
  <section id="timeline" class="section">
    <div class="section-header">
      <h2 data-i18n="section_timeline">Timeline</h2>
    </div>
    <div class="timeline" id="timeline-list"></div>
  </section>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Achievement detail modal -->
  <div class="modal-backdrop" id="modal-backdrop" style="display:none">
    <div class="modal-container" id="modal-container"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
