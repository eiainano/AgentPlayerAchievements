    name_cn: 完美主义(银牌)
    description: Unlocked all Uncommon and above achievements.
    description_cn: "解锁了所有 Uncommon 及以上成就。"
    icon: "🥈"
    category: community
    rarity: epic
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        rarity: uncommon
        include_above: true

  - id: completionist_gold
    name: "Completionist (Gold)"
    name_cn: 完美主义(金牌)
    description: Unlocked all non-hidden achievements.
    description_cn: "解锁了全部非隐藏成就。"
    icon: "🥇"
    category: community
    rarity: legendary
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        exclude_hidden: true

  - id: mythic_completionist
    name: "Mythic Completionist"
    name_cn: 超神完美主义者
    description: All achievements, including hidden ones. Are you the first?
    description_cn: "全部成就，包括隐藏。你是第一个吗？"
    icon: "👑"
    category: community
    rarity: mythic
    hidden: false
    set: completionist
    conditions:
      - type: set_completion
        all: true

  # ── Gap #2: 跨工具多样性 ──
  - id: cross_agent
    name: Cross-Agent Collector
    name_cn: 跨Agent成就收藏家
    description: Has achievement records on 2 different agent tools (e.g. Claude Code + OpenCode). Agent polyglot.
    description_cn: "在 2 个不同的 agent 工具上都有成就记录（如 Claude Code + OpenCode）。agent 多面手。"
    icon: "🔗"
    category: community
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: session.start
        field: tool_source
        operator: ">="
        value: 2

  # ============================================================
  # ── Steam-inspired: RDR2 克制设计 — "体验过即可" ──
  - id: casual_collector
    name: "Casual Collector"
    name_cn: "随缘收集"
    description: Unlocked 20 achievements. You're not hunting for completion — the good ones just come naturally.
    description_cn: "解锁了 20 个成就。你不追求全收集，好东西自然来。"
    icon: "🍀"
    category: community
    rarity: uncommon
    hidden: false
    progress_trackable: true
    conditions:
      - type: threshold
        metric: "total_achievements_unlocked"
        operator: ">="
        value: 20

  # Category: Event-Driven (事件驱动 — 由 hook 自动 emit 但未被引用的 5 个事件)
  # ============================================================

  # ── command.run ──
  - id: pipemaster
    name: "Pipemaster"
    name_cn: "管道大师"
    description: "Agent wrote 10 piped commands. Data flows between the |."
    description_cn: "agent 写出了 10 条带管道的命令。数据在 | 之间流淌。"
    icon: "🔗"
    category: tool_mastery
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: command.run
        filter: "command contains '|'"
        operator: ">="
        value: 10
        window: all

  - id: command_baby
    name: "Command Baby"
    name_cn: "命令宝宝"
    description: Agent tried 30 different shell commands. It's curious about everything on the terminal.
    description_cn: "agent 试过 30 种不同的 shell 命令。它对终端的一切都充满好奇。"
    icon: "👶"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: command.run
        field: command
        operator: ">="
        value: 30
        window: all

  - id: command_master
    name: "Command Master"
    name_cn: "命令大师"
    description: Agent used 100 different shell commands. Its terminal knowledge rivals yours.
    description_cn: "agent 用过 100 种不同的 shell 命令。它的终端知识已经不在你之下了。"
    icon: "🧙"
    category: tool_mastery
    rarity: legendary
    hidden: false
    conditions:
      - type: distinct_count
        event: command.run
        field: command
        operator: ">="
        value: 100
        window: all

  - id: cerberus
    name: "Cerberus"
    name_cn: "地狱三头犬"
    description: Agent wrote 3 piped commands. Three heads, one life, infinite output.
    description_cn: "agent 写出过 3 条带管道的命令。三个头，一条命，无限输出。"
    icon: "🐶"
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: counter
        event: command.run
        filter: "command contains '|'"
        operator: ">="
        value: 3

  # ── tool.failure ──
  - id: fail_forward
    name: "Fail Forward"
    name_cn: "初尝失败"
    description: Agent encountered its first tool call failure. Deep breath, try again.
    description_cn: "agent 第一次遇到工具调用失败。深呼吸，再来一次。"
    icon: "🫤"
    category: workflow
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 1

  - id: bounce_back
    name: "Bounce Back"
    name_cn: "反弹力"
    description: Agent failed 10 times cumulatively. Fell 10 times, stood up 11.
    description_cn: "agent 累计失败 10 次。摔倒了 10 次，站起来了 11 次。"
    icon: "🦘"
    category: workflow
    rarity: uncommon
    hidden: false
    set: agent_commander
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 10
        window: all

  - id: failure_mother
    name: "Failure Is the Mother of Success"
    name_cn: "失败是成功之母"
    description: Agent failed 100 times cumulatively. It's long past being a rookie.
    description_cn: "agent 累计失败 100 次。它早已不是当初那个菜鸟了。"
    icon: "🧘"
    category: workflow
    rarity: legendary
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 100
        window: all

  - id: phoenix
    name: "Phoenix"
    name_cn: "凤凰涅槃"
    description: Agent failed and immediately succeeded on the next try, 5 times in a row. Rise from the ashes.
    description_cn: "agent 失败后立即在下一次尝试中成功，反复 5 次。浴火重生。"
    icon: "🔥"
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: sequence_count
        pattern: ["tool.failure", "tool.complete"]
        operator: ">="
        value: 5

  # ── mcp.tool_call ──
  - id: mcp_connoisseur
    name: "MCP Connoisseur"
    name_cn: "MCP 品鉴师"
    description: Agent used 10 different MCP tools. Not just any tools.
    description_cn: "agent 用过 10 种不同的 MCP tool。不是随便什么工具都用的。"
    icon: "🍷"
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 10
        window: all

  - id: mcp_collector
    name: "MCP Collector"
    name_cn: "MCP 收藏家"
    description: Agent used 30 different MCP tools. It's not using tools — it's collecting them.
    description_cn: "agent 用过 30 种不同的 MCP tool。它不是在用工具，是在收集工具。"
    icon: "🏛️"
    category: tool_mastery
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 30
        window: all

  # ── agent.spawn ──
  - id: delegator
    name: "Delegator"
    name_cn: "放权大师"
    description: Agent dispatched 5 sub-agents. A good leader knows how to delegate.
    description_cn: "agent 派出了 5 个子 agent。懂分权才是好领导。"
    icon: "👥"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        operator: ">="
        value: 5

  - id: swat_team
    name: "SWAT Team"
    name_cn: "特种小队"
    description: Agent maintained 2-4 sub-agents working simultaneously. Small, precise tactical units.
    description_cn: "agent 同时保持 2-4 个子 agent 工作。小而精的战术单元。"
    icon: "🎯"
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        window: single_session
        operator: ">="
        value: 2
      - type: counter
        event: agent.spawn
        window: single_session
        operator: "<="
        value: 4

