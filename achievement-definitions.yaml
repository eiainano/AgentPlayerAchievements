    description_cn: agent 失败后立即在下一次尝试中成功，反复 10 次。浴火重生。
    icon: 🔥
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: sequence_count
        pattern:
          - tool.failure
          - tool.complete
        operator: ">="
        value: 10
    hint: Chain actions together repeatedly to master this pattern.
    hint_cn: 反复串联特定操作来熟练掌握。
  - id: mcp_connoisseur
    name: MCP Connoisseur
    name_cn: MCP 品鉴师
    description: Agent used 10 different MCP tools. Not just any tools.
    description_cn: agent 用过 10 种不同的 MCP tool。不是随便什么工具都用的。
    icon: 🍷
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 10
        window: all
    hint: Try as many different tools as you can — variety builds mastery.
    hint_cn: 试试尽可能多的不同工具——多样性带来精通。
  - id: mcp_collector
    name: MCP Collector
    name_cn: MCP 收藏家
    description: Agent used 30 different MCP tools. It's not using tools — it's collecting them.
    description_cn: agent 用过 30 种不同的 MCP tool。它不是在用工具，是在收集工具。
    icon: 🏛️
    category: tool_mastery
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 30
        window: all
    hint: Try as many different tools as you can — variety builds mastery.
    hint_cn: 试试尽可能多的不同工具——多样性带来精通。
  - id: scribe
    name: Scribe
    name_cn: 笔耕不辍
    description: Wrote 50 files from scratch. Words become code, code becomes files.
    description_cn: 从零写了 50 个文件。文字变代码，代码变文件。
    icon: ✍️
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Ask Claude to create new files — each one starts with a blank page
    hint_cn: 让 Claude 从零创建新文件——每一页都从空白开始
    conditions:
      - type: counter
        event: file.write
        operator: ">="
        value: 50
        window: all
    tip: Creating files from scratch gives you full control over the structure. Describe the purpose, not just the content —
      Claude will scaffold imports, types, and exports that integrate with your existing patterns.
    tip_cn: 从零创建文件让你完全掌控结构。描述用途而非仅仅内容——Claude 会搭建好导入、类型和导出，使其与你现有的代码模式集成。
  - id: delegator
    name: Delegator
    name_cn: 放权大师
    description: Agent dispatched 5 sub-agents. A good leader knows how to delegate.
    description_cn: agent 派出了 5 个子 agent。懂分权才是好领导。
    icon: 👥
    category: workflow
    rarity: uncommon
    hidden: false
    hint: Delegate tasks to sub-agents
    hint_cn: 把任务委派给子 agent 去处理
    conditions:
      - type: counter
        event: agent.spawn
        operator: ">="
        value: 5
    set: agent_commander
    tip: Sub-agents let you parallelize work. Each agent works independently on its task — one can refactor while another
      writes tests. Great for large migrations, multi-file changes, and code review.
    tip_cn: 子 agent 让你并行工作。每个 agent 独立处理自己的任务——一个重构代码，另一个写测试。适合大规模迁移、多文件修改和代码审查。
  - id: swat_team
    name: SWAT Team
    name_cn: 特种小队
    description: Spawned exactly 4 sub-agents in a single session. Four-person tactical unit.
    description_cn: 同一 session 中恰好 spawn 了 4 个子 agent。四人战术小组。
    icon: 🎯
    category: workflow
    rarity: common
    hidden: false
    hint: Assemble multiple agents to collaborate at once
    hint_cn: 一次性召集多个 agent 来协作
    conditions:
      - type: counter
        event: agent.spawn
        window: single_session
        operator: ==
        value: 4
    set: agent_commander
    tip: Sub-agents let you parallelize work. Each agent works independently on its task — one can refactor while another
      writes tests. Great for large migrations, multi-file changes, and code review.
    tip_cn: 子 agent 让你并行工作。每个 agent 独立处理自己的任务——一个重构代码，另一个写测试。适合大规模迁移、多文件修改和代码审查。
  - id: avengers_assemble
    name: Avengers Assemble
    name_cn: 复仇者集结
    description: Spawned 6 distinct agent types. Each hero brings a different power. Avengers, assemble!
    description_cn: Spawn 过 6 种不同类型的 agent。每位英雄各怀绝技。复仇者，集结！
    icon: 🛡️
    category: workflow
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: agent.spawn
        field: agent_type
        operator: ==
        value: 6
    set: agent_commander
    hint: Try different agent types — each has unique strengths.
    hint_cn: 试试不同类型的 agent——各有专长。
  - id: shipper
    name: Ship It
    name_cn: 一键发货
    description: 10 git pushes. Ship early, ship often.
    description_cn: 10 次 git 推送。早发多发。
    icon: 🚢
    category: workflow
    rarity: common
    hidden: false
    hint: Push your commits regularly — code not shipped is just a dream
    hint_cn: 记得推送你的 commit——不推上去的代码只是白日梦
    set: git_flow
    conditions:
      - type: counter
        event: git.push
        operator: ">="
        value: 10
        window: all
    tip: Code that isn't pushed might as well not exist. Regular pushes enable CI/CD, collaboration, and backups. Claude can
      push for you — but always review before pushing to shared branches.
    tip_cn: 不推送的代码和不写没区别。定期推送让 CI/CD、协作和备份成为可能。Claude 可以帮你推送——但在推送到共享分支前务必 review。
  - id: pythonista
    name: Pythonista
    name_cn: Pythonista
    description: Write 50+ Python files. Snake? No, Python.
    description_cn: 写了 50+ 个 Python 文件。是蟒蛇不是巨蟒。
    icon: 🐍
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Work with Python files regularly
    hint_cn: 经常使用 Python 写代码
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'python'
        operator: ">="
        value: 50
        window: all
    set: linguist
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: type_astronaut
    name: Type Astronaut
    name_cn: 类型宇航员
    description: Write 50+ TypeScript files. Types are rocket fuel.
    description_cn: 写了 50+ 个 TypeScript 文件。类型就是火箭燃料。
    icon: 📘
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Work with TypeScript regularly — types pay off in the long run
    hint_cn: 经常使用 TypeScript——类型系统长期来看是值得的
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'typescript'
        operator: ">="
        value: 50
        window: all
    set: linguist
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: web_weaver
    name: Web Weaver
    name_cn: 网络织者
    description: Write 50+ JavaScript files. Weaving the web since '95.
    description_cn: 写了 50+ 个 JavaScript 文件。95 年就开始织网。
    icon: 🕸️
    category: tool_mastery
    rarity: common
    hidden: false
    hint: Work with JavaScript files regularly
    hint_cn: 经常使用 JavaScript 写代码
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'javascript'
        operator: ">="
        value: 50
        window: all
    set: linguist
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: bean_counter
    name: Bean Counter
    name_cn: 咖啡豆计数员
    description: Write 50+ Java files. Object my my my.
    description_cn: 写了 50+ 个 Java 文件。对象啊对象。
    icon: ☕
    category: tool_mastery
    rarity: uncommon
    hidden: false
    hint: Work with Java files
    hint_cn: 经常使用 Java 写代码
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'java'
        operator: ">="
        value: 50
        window: all
    set: linguist
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: pointer_pilot
    name: Pointer Pilot
    name_cn: 指针领航员
    description: Write 50+ C or C++ files. Manual memory? manual fun.
    description_cn: 写了 50+ 个 C 或 C++ 文件。手动内存，手动乐趣。
    icon: 🔗
    category: tool_mastery
    rarity: rare
    hidden: false
    hint: Work with C or C++ files
    hint_cn: 经常使用 C 或 C++ 写代码
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language in ['c', 'cpp']
        operator: ">="
        value: 50
        window: all
    set: linguist
  - id: ferris_fan
    name: Ferris Fan
    name_cn: 螃蟹粉丝
    description: Write 50+ Rust files. The borrow checker approves.
    description_cn: 写了 50+ 个 Rust 文件。借用检查器表示通过。
    icon: 🦀
    category: tool_mastery
    rarity: rare
    hidden: false
    hint: Work with Rust files — fearless concurrency awaits
    hint_cn: 经常使用 Rust——无畏并发在等你
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'rust'
        operator: ">="
        value: 50
        window: all
    set: linguist
  - id: go_getter
    name: Go Getter
    name_cn: 进取者
    description: Write 50+ Go files. Simplicity is a feature.
    description_cn: 写了 50+ 个 Go 文件。简洁就是一种特性。
    icon: 🏃
    category: tool_mastery
    rarity: uncommon
    hidden: false
    hint: Work with Go files regularly
    hint_cn: 经常使用 Go 写代码
    progress_trackable: true
    conditions:
      - type: counter
        event: file.language_used
        filter: language == 'go'
        operator: ">="
        value: 50
        window: all
    set: linguist
    tip: Master this feature through consistent use. The more you use it, the more natural it becomes.
    tip_cn: 通过持续使用来掌握这个功能。用得越多越自然。
  - id: smorgasbord
    name: Smorgasbord
    name_cn: 丰盛大餐
    description: Use 6+ languages in one session. All-you-can-code buffet.
    description_cn: 单次 session 用 6+ 种语言。编码自助餐。
    icon: 🧩
    category: challenge
    rarity: rare
    hidden: false
    hint: Switch between many programming languages in a single session
    hint_cn: 单次 session 中使用多种编程语言
    challenge: true
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        window: single_session
        operator: ">="
        value: 6
    set: linguist
  - id: full_spectrum
    name: Full Spectrum
    name_cn: 全光谱
    description: Use 10+ languages cumulatively. True polyglot, no impostor.
    description_cn: 累计使用过 10+ 种语言。真多语言者。
    icon: 🌈
    category: milestones
    rarity: epic
    hidden: false
    progress_trackable: true
    conditions:
      - type: distinct_count
        event: file.language_used
        field: language
        window: all
        operator: ">="
        value: 10
    set: linguist
    hint: Work in different programming languages to broaden your horizons.
    hint_cn: 尝试不同的编程语言，拓宽你的视野。
  - id: test_champion
    name: Test Champion
    name_cn: 测试冠军
    description: 500 tests passed. The CI pipeline worships you.
    description_cn: 累计 500 个测试通过。CI 流程视你为神。
    icon: 🏆
    category: milestones
    rarity: epic
    hidden: false
    hint: Keep writing tests — green is the best color
    hint_cn: 持续写测试——绿色是最好的颜色
    progress_trackable: true
    conditions:
      - type: counter
        event: test.pass
        operator: ">="
        value: 500
        window: all
    set: endurance
  - id: the_scheduler
    name: The Scheduler
    name_cn: 日程规划师
    description: Start sessions at 12+ different hours. You're always there.
    description_cn: 在 12+ 个不同时间段启动过 session。你无处不在。
    icon: 📅
    category: style
    rarity: uncommon
    hidden: false
    hint: Code at different times of day — see how the world changes
    hint_cn: 在不同时间编码——看看世界如何变化
    progress_trackable: true
    conditions:
      - type: distinct_count
        event: session.start
        field: hour
        window: all
        operator: ">="
        value: 12
    tip: Variety is the spice of mastery. The broader your experience across different options, the better your intuition
      for choosing the right one.
    tip_cn: 多样性是精通的关键。你在不同选项上的经验越广，你对"选哪个"的直觉就越好。
  - id: power_session
    name: Power Session
    name_cn: 全力冲刺
    description: 25+ tools in a single session. Full throttle.
    description_cn: 单次 session 中发起 25+ 次工具调用。马力全开。
    icon: ⚡
    category: endurance
    rarity: uncommon
    hidden: false
    hint: A focused session with high tool throughput — go deep
    hint_cn: 一次高工具吞吐量的专注 session——深度工作
    progress_trackable: true
    conditions:
      - type: counter
        event: tool.complete
        window: single_session
        operator: ">="
        value: 25
    set: endurance
    tip: "Chaining tools is the key to productivity. A typical flow: Read (understand) → Plan (think) → Edit (change) → Bash
      (test). The fewer turns per task, the faster you ship."
    tip_cn: 串联工具是提升效率的关键。典型工作流：Read（理解）→ Plan（思考）→ Edit（修改）→ Bash（测试）。每个 task 的交互轮数越少，你交付得越快。
