    name: Fail Forward
    name_cn: 初尝失败
    description: Agent encountered its first tool call failure. Deep breath, try again.
    description_cn: agent 第一次遇到工具调用失败。深呼吸，再来一次。
    icon: 🫤
    category: workflow
    rarity: common
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 1
  - id: bounce_back
    name: Bounce Back
    name_cn: 反弹力
    description: Agent failed 10 times cumulatively. Fell 10 times, stood up 11.
    description_cn: agent 累计失败 10 次。摔倒了 10 次，站起来了 11 次。
    icon: 🦘
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 10
        window: all
  - id: failure_mother
    name: Failure Is the Mother of Success
    name_cn: 失败是成功之母
    description: Agent failed 100 times cumulatively. It's long past being a rookie.
    description_cn: agent 累计失败 100 次。它早已不是当初那个菜鸟了。
    icon: 🧘
    category: workflow
    rarity: legendary
    hidden: false
    conditions:
      - type: counter
        event: tool.failure
        operator: ">="
        value: 100
        window: all
  - id: phoenix
    name: Phoenix
    name_cn: 凤凰涅槃
    description: Agent failed and immediately succeeded on the next try, 10 times. Rise from the ashes.
    description_cn: agent 失败后立即在下一次尝试中成功，反复 10 次。浴火重生。
    icon: 🔥
    category: skill
    rarity: epic
    hidden: false
    conditions:
      - type: sequence_count
        pattern:
          - tool.failure
          - tool.complete
        operator: ">="
        value: 10
  - id: mcp_connoisseur
    name: MCP Connoisseur
    name_cn: MCP 品鉴师
    description: Agent used 10 different MCP tools. Not just any tools.
    description_cn: agent 用过 10 种不同的 MCP tool。不是随便什么工具都用的。
    icon: 🍷
    category: tool_mastery
    rarity: rare
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 10
        window: all
  - id: mcp_collector
    name: MCP Collector
    name_cn: MCP 收藏家
    description: Agent used 30 different MCP tools. It's not using tools — it's collecting them.
    description_cn: agent 用过 30 种不同的 MCP tool。它不是在用工具，是在收集工具。
    icon: 🏛️
    category: tool_mastery
    rarity: epic
    hidden: false
    conditions:
      - type: distinct_count
        event: mcp.tool_call
        field: tool_name
        operator: ">="
        value: 30
        window: all
  - id: delegator
    name: Delegator
    name_cn: 放权大师
    description: Agent dispatched 5 sub-agents. A good leader knows how to delegate.
    description_cn: agent 派出了 5 个子 agent。懂分权才是好领导。
    icon: 👥
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        operator: ">="
        value: 5
    set: agent_commander
  - id: swat_team
    name: SWAT Team
    name_cn: 特种小队
    description: Spawned exactly 4 sub-agents in a single session. Four-person tactical unit.
    description_cn: 同一 session 中恰好 spawn 了 4 个子 agent。四人战术小组。
    icon: 🎯
    category: workflow
    rarity: uncommon
    hidden: false
    conditions:
      - type: counter
        event: agent.spawn
        window: single_session
        operator: ==
        value: 4
    set: agent_commander
